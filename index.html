<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Salon Status</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0ee;color:#1a1a1a;padding:28px;}
h1{font-size:28px;font-weight:700;letter-spacing:.5px;margin-bottom:4px;}
.title-row{display:flex;align-items:center;gap:16px;margin-bottom:6px;}
.title-row h1{margin:0;flex-shrink:0;}
.subtitle{font-size:14px;color:#888;margin-bottom:8px;}
.top-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.view-badge{font-size:12px;font-weight:500;padding:3px 10px;border-radius:12px;background:#FAEEDA;border:1px solid #BA7517;color:#633806;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;}
.sync-dot.connected{background:#1D9E75;}
.sync-txt{font-size:12px;color:#888;}
.clock{font-size:12px;color:#aaa;margin-bottom:16px;}

/* Alert */
.alert{border-radius:12px;padding:14px 18px;margin-bottom:18px;display:none;flex-direction:column;gap:8px;}
.alert.show{display:flex;}
.alert-top{display:flex;align-items:flex-start;gap:10px;}
.alert-icon{font-size:22px;flex-shrink:0;line-height:1.3;}
.alert-text{font-size:15px;font-weight:600;line-height:1.4;}
.alert-stores{display:flex;flex-wrap:wrap;gap:6px;padding-left:32px;}
.store-pill{font-size:12px;font-weight:600;padding:3px 11px;border-radius:12px;}
.alert-ot{background:#FCEBEB;border:2px solid #E24B4A;color:#791F1F;animation:flashFast .8s infinite;}
.alert-w15{background:#FCEBEB;border:2px solid #E24B4A;color:#791F1F;animation:flashSlow 1.2s infinite;}
.alert-w30{background:#FAEEDA;border:2px solid #BA7517;color:#633806;animation:flashMed 1.8s infinite;}
.pill-ot,.pill-w15{background:#F7C1C1;color:#791F1F;border:1px solid #E24B4A;}
.pill-w30{background:#FAC775;color:#633806;border:1px solid #BA7517;}
@keyframes flashFast{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes flashSlow{0%,100%{opacity:1;}50%{opacity:.55;}}
@keyframes flashMed{0%,100%{opacity:1;}50%{opacity:.6;}}

/* Badges */
.sb{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;white-space:nowrap;}
.sb-active{background:#E1F5EE;color:#085041;border:1px solid #0F6E56;}
.sb-w30{background:#BA7517;color:#fff;animation:flashMed 1.8s infinite;}
.sb-w15{background:#E24B4A;color:#fff;animation:flashSlow 1.2s infinite;}
.sb-ot{background:#A32D2D;color:#fff;animation:flashFast .8s infinite;}
.sb-up{background:#eee;color:#888;border:1px solid #ccc;}
.sb-done{background:#f0f0f0;color:#bbb;border:1px solid #ddd;}

.empty-notice{text-align:center;padding:60px 20px;color:#aaa;font-size:14px;}

/* ── DESKTOP (≥768px) ── */
@media(min-width:768px){
  body{padding:36px;}
  h1{font-size:28px;}
  .card-view{display:none;}
  .table-view{display:block;}
  .grid-wrap{overflow-x:auto;border-radius:12px;border:1px solid #ccc;background:#fff;box-shadow:0 2px 16px rgba(0,0,0,.08);}
  table{width:100%;border-collapse:collapse;min-width:1100px;table-layout:fixed;}
  thead th{background:#2C3E6B;color:#ffffff;font-size:15px;font-weight:600;letter-spacing:.3px;padding:18px 14px;text-align:center;border-right:1px solid #3d5080;}
  thead th:first-child{text-align:center;min-width:170px;border-right:2px solid #3d5080;font-size:14px;}
  thead th:last-child{border-right:none;}
  tbody tr{border-bottom:1px solid #e0e0e0;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:nth-child(even){background:#fafafa;}
  tbody td{border-right:1px solid #e8e8e8;padding:5px;vertical-align:top;}
  tbody td:first-child{padding:8px 14px;background:#EEF1F8;text-align:center;vertical-align:middle;white-space:nowrap;border-right:2px solid #c8cfe0;width:170px;}
  tbody td:last-child{border-right:none;}
  .slot-label{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .slot-time{font-size:16px;font-weight:700;color:#2C3E6B;}
  .cell{min-height:100px;border-radius:10px;border:1.5px dashed #d0d0d0;display:flex;align-items:center;justify-content:center;}
  .cell.filled{border:none;align-items:stretch;}
  .cell.cell-ot{border:2px solid #E24B4A;background:#FCEBEB;animation:flashFast .8s infinite;}
  .cell.cell-w15{border:1.5px solid #E24B4A;background:#fff0f0;animation:flashSlow 1.2s infinite;}
  .cell.cell-w30{border:1.5px solid #BA7517;background:#fff9ee;animation:flashMed 1.8s infinite;}
  .cell.cell-done{border:1px solid #e0e0e0;background:#f5f5f5;}
  .assigned{padding:7px 8px;border-radius:8px;width:100%;display:flex;flex-direction:column;gap:2px;}
  .store-name-lbl{font-size:13px;font-weight:700;display:block;margin-bottom:1px;}
  .staff-line{font-size:10px;opacity:.85;display:block;line-height:1.6;}
  .cell-divider{border:none;border-top:0.5px solid rgba(0,0,0,.15);margin:3px 0;}
  .client-line{font-size:10px;font-weight:500;display:block;line-height:1.6;color:#3C3489;}
  .queue-v-card{background:#fff;border:1px solid #d8d7d4;border-radius:8px;padding:8px 12px;min-width:140px;max-width:180px;flex-shrink:0;}
  .queue-v-num{font-size:10px;font-weight:500;color:#999;margin-bottom:3px;}
  .queue-v-store{font-size:13px;font-weight:600;color:#1F2D45;margin-bottom:3px;}
  .queue-v-info{font-size:11px;color:#666;line-height:1.6;}
  .round-hdr-v:hover{filter:brightness(.95);}
  .round-hdr-v .chv{font-size:9px;transition:transform .2s;}
  .round-hdr-v.open .chv{transform:rotate(180deg);}
}

/* ── MOBILE (<768px) ── */
@media(max-width:767px){
  .table-view{display:none;}
  .card-view{display:block;}
  .title-row{display:block;}
  .slot-card{background:#fff;border-radius:12px;border:1px solid #ddd;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.05);}
  .slot-card.card-ot{border:2px solid #E24B4A;animation:flashFast .8s infinite;}
  .slot-card.card-w15{border:2px solid #E24B4A;animation:flashSlow 1.2s infinite;}
  .slot-card.card-w30{border:2px solid #BA7517;animation:flashMed 1.8s infinite;}
  .slot-card.card-done{border:1px solid #e0e0e0;}
  .slot-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#2C3E6B;}
  .slot-time-m{font-size:15px;font-weight:700;color:#fff;}
  .slot-rooms{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;}
  .room-cell{border-radius:8px;border:1.5px dashed #ddd;min-height:70px;display:flex;flex-direction:column;}
  .room-cell.has-store{border:none;}
  .room-cell.cell-ot{border:2px solid #E24B4A;background:#FCEBEB;animation:flashFast .8s infinite;}
  .room-cell.cell-w15{border:1.5px solid #E24B4A;background:#fff0f0;animation:flashSlow 1.2s infinite;}
  .room-cell.cell-w30{border:1.5px solid #BA7517;background:#fff9ee;animation:flashMed 1.8s infinite;}
  .room-cell.cell-done{border:1px solid #e0e0e0;background:#f5f5f5;}
  .room-lbl{font-size:10px;font-weight:600;color:#aaa;padding:5px 8px 0;letter-spacing:.3px;}
  .store-nm{font-size:13px;font-weight:700;padding:1px 8px;line-height:1.3;}
  .staff-lbl-m{font-size:10px;padding:0 8px;opacity:.85;line-height:1.6;display:block;}
  .cell-divider-m{border:none;border-top:0.5px solid rgba(0,0,0,.15);margin:3px 8px;}
  .client-lbl-m{font-size:10px;font-weight:500;padding:0 8px;color:#3C3489;display:block;line-height:1.6;}
  .done-lbl-m{font-size:10px;font-weight:500;padding:2px 8px 5px;color:#888;}
  .room-empty{display:flex;align-items:center;justify-content:center;height:70px;color:#ddd;font-size:11px;}
}
</style>
</head>
<body>
<div class="title-row">
  <h1>VIP SALON STATUS</h1>
  <!-- 電腦版候位區（標題右側，手機版隱藏）-->
  <div class="table-view" id="queueViewDesktop" style="flex:1;min-width:0;">
    <div style="display:flex;align-items:center;gap:10px;background:#e4e3e0;border-radius:12px;border:1px solid #ccc;padding:8px 14px;">
      <div style="font-size:13px;font-weight:600;color:#444;white-space:nowrap;">📋 包廂排隊區</div>
      <div id="queueViewList" style="display:flex;flex-direction:row;gap:8px;flex-wrap:nowrap;overflow-x:auto;flex:1;min-width:0;">
        <div id="queueViewEmpty" style="font-size:12px;color:#bbb;padding:2px 0;">目前無候位</div>
      </div>
    </div>
  </div>
</div>

<div class="top-row">
  <span class="view-badge">👁 觀看模式</span>
  <span class="sync-dot" id="syncDot"></span>
  <span class="sync-txt" id="syncStatus">連線中...</span>
</div>
<div class="clock" id="clock"></div>

<div class="alert" id="alertBanner">
  <div class="alert-top"><span class="alert-icon" id="alertIcon"></span><span class="alert-text" id="alertMsg"></span></div>
  <div class="alert-stores" id="alertStores"></div>
</div>

<!-- 電腦版表格 -->
<div class="table-view">
  <div class="grid-wrap"><table id="grid"></table></div>
</div>

<!-- 手機版 -->
<div class="card-view">
  <!-- 手機版候位按鈕 -->
  <div id="mobileQueueBtn" style="margin-bottom:12px;">
    <button onclick="showMobileQueue()" style="width:100%;padding:10px;border-radius:10px;border:1px solid #185FA5;background:#E6F1FB;color:#185FA5;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">📋 包廂排隊區</button>
  </div>
  <!-- 手機版卡片 -->
  <div id="slotCards"></div>
  <!-- 手機版候位頁面 -->
  <div id="mobileQueueView" style="display:none;">
    <button onclick="hideMobileQueue()" style="margin-bottom:12px;padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;">← 返回包廂</button>
    <div id="mobileQueueList" style="display:flex;flex-direction:column;gap:10px;"></div>
    <div id="mobileQueueEmpty" style="font-size:13px;color:#bbb;text-align:center;padding:24px 0;display:none;">目前無候位</div>
  </div>
</div>

<!-- TOKEN 狀況 -->
<div id="tokenDisplay" style="margin-top:24px;display:none;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
    <div style="font-size:16px;font-weight:600;color:#1a1a1a;">🎫 13號備用TOKEN</div>
    <div id="tokenViewSummary" style="display:flex;gap:10px;"></div>
  </div>
  <div id="tokenViewGrid" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
</div>
<div class="empty-notice" id="emptyNotice" style="display:none;">尚未有分配資料，請等待管理員設定。</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const app=initializeApp({apiKey:"AIzaSyB4ywZ1LfnE8M2XT41yrCxl4_a-jYdwQn8",authDomain:"vip-room-scheduler.firebaseapp.com",databaseURL:"https://vip-room-scheduler-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"vip-room-scheduler",storageBucket:"vip-room-scheduler.firebasestorage.app",messagingSenderId:"1064515548287",appId:"1:1064515548287:web:11f5ab1537cbc60371bb4a"});
const db=getDatabase(app),dbRef=ref(db,'scheduler');
// 偵測連線狀態
onValue(ref(db,'.info/connected'),snap=>{
  const connected=snap.val();
  const dot=document.getElementById('syncDot');
  const txt=document.getElementById('syncStatus');
  if(connected){dot.className='sync-dot connected';txt.style.color='';txt.textContent='即時同步中';}
  else{dot.className='sync-dot';txt.style.color='#E24B4A';txt.textContent='連線中斷，請確認網路...';}
});

const COLORS=[{bg:'#E6F1FB',border:'#185FA5',text:'#0C447C'},{bg:'#E1F5EE',border:'#0F6E56',text:'#085041'},{bg:'#FAEEDA',border:'#BA7517',text:'#633806'},{bg:'#FAECE7',border:'#993C1D',text:'#712B13'},{bg:'#EEEDFE',border:'#534AB7',text:'#3C3489'},{bg:'#FBEAF0',border:'#993556',text:'#72243E'},{bg:'#EAF3DE',border:'#3B6D11',text:'#27500A'},{bg:'#F1EFE8',border:'#5F5E5A',text:'#444441'},{bg:'#FCEBEB',border:'#A32D2D',text:'#791F1F'},{bg:'#E8F8FA',border:'#0A7C8C',text:'#055562'}];
let SLOTS=['11:00–13:00','13:00–15:00','15:00–17:00','17:00–19:00','19:00–21:00'];
let ROOMS=Array.from({length:9},(_,i)=>`包廂 ${i+1}`);
let STORES=[{id:'ksh',name:'HSM'},{id:'ksha',name:'Arena'},{id:'tch',name:'TCH'},{id:'tnn',name:'TN'},{id:'101',name:'TPE 101'},{id:'a3',name:'A3'},{id:'lvb',name:'LVB'},{id:'sogo',name:'SOGO'}];
let assignments={},returned={},staff={},tokens={},clients={};
let assignments2={},staff2={},clients2={},returned2={};
let queue=[];
const TOKEN_TOTAL=5;
const color=id=>COLORS[STORES.findIndex(s=>s.id===id)%COLORS.length]||COLORS[0];
const key=(r,s)=>`${r}||${s}`;

function parseSlot(slot){
  const parts=slot.replace(/[–—-]/,'|').split('|');
  if(parts.length<2)return null;
  const[sh,sm]=(parts[0].trim()+':00').split(':').map(Number);
  const[eh,em]=(parts[1].trim()+':00').split(':').map(Number);
  return{startH:sh,startM:sm||0,endH:eh,endM:em||0};
}

// slotStatus per-room
function roomStatus(slot,k){
  const p=parseSlot(slot);if(!p)return'upcoming';
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const startMs=base.getTime()+(p.startH*60+p.startM)*60*1000;
  const endMs=base.getTime()+(p.endH*60+p.endM)*60*1000;
  if(now.getTime()<startMs)return'upcoming';
  const msToEnd=endMs-now.getTime();
  if(msToEnd<0)return'overtime';
  if(msToEnd<=15*60*1000)return'warn15';
  if(msToEnd<=30*60*1000)return'warn30';
  return'active';
}

// Slot-level status = worst among occupied rooms
// 場次原始狀態 — 用於卡片標頭顯示
function slotStatusRaw(slot){
  const p=parseSlot(slot);if(!p)return'upcoming';
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const startMs=base.getTime()+(p.startH*60+p.startM)*60*1000;
  const endMs=base.getTime()+(p.endH*60+p.endM)*60*1000;
  if(now.getTime()<startMs)return'upcoming';
  const msToEnd=endMs-now.getTime();
  if(msToEnd<0){
    // 已超時：確認是否可視為已結束
    const hasUnreturned=ROOMS.some(room=>{
      const k=key(room,slot);
      return assignments[k]&&!returned[k];
    });
    if(!hasUnreturned){
      const si=SLOTS.indexOf(slot);
      if(si===SLOTS.length-1)return'done';
      const nextP=parseSlot(SLOTS[si+1]);
      if(nextP){
        const nextStartMs=base.getTime()+(nextP.startH*60+nextP.startM)*60*1000;
        if(now.getTime()>=nextStartMs)return'done';
      }
    }
    return'overtime';
  }
  if(msToEnd<=15*60*1000)return'warn15';
  if(msToEnd<=30*60*1000)return'warn30';
  return'active';
}

function slotStatus(slot){
  const order=['overtime','warn15','warn30','active','upcoming','done'];
  let worst='upcoming';
  ROOMS.forEach(room=>{
    const k=key(room,slot);
    const sid=assignments[k];
    const sid2=assignments2[k];
    // 第一輪未歸還
    if(sid&&!returned[k]){
      const st=roomStatus(slot,k);
      if(order.indexOf(st)<order.indexOf(worst))worst=st;
    }
    // 第二輪未歸還
    if(sid2&&!returned2[k]){
      const st=roomStatus(slot,k);
      if(order.indexOf(st)<order.indexOf(worst))worst=st;
    }
  });

  if(worst==='overtime'){
    const p=parseSlot(slot);if(!p)return'overtime';
    const now=new Date();
    const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const endMs=base.getTime()+(p.endH*60+p.endM)*60*1000;
    if(now.getTime()>endMs){
      const hasUnreturned=ROOMS.some(room=>{
        const k=key(room,slot);
        return (assignments[k]&&!returned[k])||(assignments2[k]&&!returned2[k]);
      });
      if(!hasUnreturned){
        const si=SLOTS.indexOf(slot);
        if(si===SLOTS.length-1)return'done';
        const nextP=parseSlot(SLOTS[si+1]);
        if(nextP){
          const nextStartMs=base.getTime()+(nextP.startH*60+nextP.startM)*60*1000;
          if(now.getTime()>=nextStartMs)return'done';
        }
      }
    }
    return'overtime';
  }

  if(worst==='upcoming'){
    const p=parseSlot(slot);if(!p)return'upcoming';
    const now=new Date();
    const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const startMs=base.getTime()+(p.startH*60+p.startM)*60*1000;
    const endMs=base.getTime()+(p.endH*60+p.endM)*60*1000;
    if(now.getTime()<startMs)return'upcoming';
    // 場次已過時間，所有包廂都已歸還 → done
    if(now.getTime()>endMs)return'done';
    return'active';
  }
  return worst;
}

function occupiedRooms(slot){
  const res=[];
  ROOMS.forEach(room=>{
    const k=key(room,slot);
    // 第一輪未歸還
    const sid=assignments[k];
    if(sid&&!returned[k]){
      const rst=roomStatus(slot,k);
      if(rst==='overtime'||rst==='warn15'||rst==='warn30'){
        const s=STORES.find(x=>x.id===sid);
        if(s)res.push({room,k,sid,name:s.name});
      }
    }
    // 第二輪未歸還（第一輪已歸還但第二輪還在）
    const sid2=assignments2[k];
    if(sid2&&!returned2[k]&&!(sid&&!returned[k])){
      const rst=roomStatus(slot,k);
      if(rst==='overtime'||rst==='warn15'||rst==='warn30'){
        const s=STORES.find(x=>x.id===sid2);
        if(s)res.push({room,k,sid:sid2,name:s.name});
      }
    }
  });
  return res;
}

function badgeFor(st,slot){
  // 使用原始場次結束時間
  function origEndMs(slot){
    const p=parseSlot(slot);if(!p)return null;
    const now=new Date();
    const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    return base.getTime()+(p.endH*60+p.endM)*60*1000;
  }
  if(st==='active'){
    const endMs=origEndMs(slot);
    if(endMs){
      const mins=Math.round((endMs-Date.now())/60000);
      return`<span class="sb sb-active">● 進行中 剩 ${mins} 分</span>`;
    }
    return'<span class="sb sb-active">● 進行中</span>';
  }
  if(st==='warn30'){
    const endMs=origEndMs(slot);
    if(endMs){
      const mins=Math.round((endMs-Date.now())/60000);
      return`<span class="sb sb-w30">⚠ 剩 ${mins} 分</span>`;
    }
    return'<span class="sb sb-w30">⚠ 30分後結束</span>';
  }
  if(st==='warn15'){
    const endMs=origEndMs(slot);
    if(endMs){
      const mins=Math.round((endMs-Date.now())/60000);
      return`<span class="sb sb-w15">⚠ 剩 ${mins} 分</span>`;
    }
    return'<span class="sb sb-w15">⚠ 15分後結束</span>';
  }
  if(st==='overtime'){
    const endMs=origEndMs(slot);
    if(endMs){
      const otMins=Math.abs(Math.round((endMs-Date.now())/60000));
      return`<span class="sb sb-ot">🚨 已超時 ${otMins} 分</span>`;
    }
    return'<span class="sb sb-ot">🚨 已超時</span>';
  }
  if(st==='done')return'<span class="sb sb-done">已結束</span>';
  return'<span class="sb sb-up">待開始</span>';
}

function cellCls(st,hasStore){
  if(!hasStore)return'cell';
  let c='cell filled';
  if(st==='overtime')c+=' cell-ot';
  else if(st==='warn15')c+=' cell-w15';
  else if(st==='warn30')c+=' cell-w30';
  else if(st==='done')c+=' cell-done';
  return c;
}

function updateAlert(){
  const banner=document.getElementById('alertBanner');
  let worst=null;
  const order=['overtime','warn15','warn30'];
  SLOTS.forEach(slot=>{
    occupiedRooms(slot).forEach(({k,name})=>{
      const st=roomStatus(slot,k);
      if(!order.includes(st))return;
      // 計算剩餘分鐘
      const p=parseSlot(slot);
      let mins=0;
      if(p){
        const now=new Date();
        const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
        const endMs=base.getTime()+(p.endH*60+p.endM)*60*1000;
        mins=Math.round((endMs-now.getTime())/60000);
      }
      if(!worst||order.indexOf(st)<order.indexOf(worst.st))
        worst={slot,st,mins};
    });
  });
  if(!worst){banner.className='alert';return;}

  const alarmingNames=[...new Set(
    occupiedRooms(worst.slot)
      .filter(({k})=>order.includes(roomStatus(worst.slot,k)))
      .map(({name})=>name)
  )];

  let pillClass,alertClass,iconTxt,msgTxt;
  if(worst.st==='overtime'){
    alertClass='alert alert-ot show';iconTxt='🚨';pillClass='pill-ot';
    msgTxt=`超時！場次 ${worst.slot} 已結束，請撤出包廂：`;
  }else if(worst.st==='warn15'){
    alertClass='alert alert-w15 show';iconTxt='⚠️';pillClass='pill-w15';
    msgTxt=`注意！場次 ${worst.slot} 距結束剩 ${Math.max(0,worst.mins)} 分鐘，請提醒以下店鋪準備離場：`;
  }else{
    alertClass='alert alert-w30 show';iconTxt='！';pillClass='pill-w30';
    msgTxt=`提醒：場次 ${worst.slot} 距結束剩 ${worst.mins} 分鐘，以下店鋪使用中：`;
  }
  banner.className=alertClass;
  document.getElementById('alertIcon').textContent=iconTxt;
  document.getElementById('alertMsg').textContent=msgTxt;
  document.getElementById('alertStores').innerHTML=alarmingNames.map(n=>`<span class="store-pill ${pillClass}">${n}</span>`).join('');
}

function slotCountdownHTML(slot){
  const p=parseSlot(slot);if(!p)return'';
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const startMs=base.getTime()+(p.startH*60+p.startM)*60*1000;
  const endMs=base.getTime()+(p.endH*60+p.endM)*60*1000;
  if(now.getTime()<startMs)return`<span class="sb sb-up">待開始</span>`;
  const msToEnd=endMs-now.getTime();
  if(msToEnd<0){
    const otMins=Math.abs(Math.round(msToEnd/60000));
    const si=SLOTS.indexOf(slot);
    // 檢查是否可視為「已結束」：下一場次已開始，或是最後一個場次且無未歸還包廂
    const hasUnreturned=ROOMS.some(room=>{
      const k=key(room,slot);
      return assignments[k]&&!returned[k];
    });
    if(!hasUnreturned){
      if(si===SLOTS.length-1){
        // 最後一個場次，無未歸還包廂 → 已結束
        return`<span class="sb sb-done">已結束</span>`;
      }
      const nextP=parseSlot(SLOTS[si+1]);
      if(nextP){
        const nextStartMs=base.getTime()+(nextP.startH*60+nextP.startM)*60*1000;
        if(now.getTime()>=nextStartMs)return`<span class="sb sb-done">已結束</span>`;
      }
    }
    return`<span class="sb sb-ot">🚨 已超時 ${otMins} 分</span>`;
  }
  const mins=Math.round(msToEnd/60000);
  if(mins<=15)return`<span class="sb sb-w15">⚠ 剩 ${mins} 分</span>`;
  if(mins<=30)return`<span class="sb sb-w30">⚠ 剩 ${mins} 分</span>`;
  return`<span class="sb sb-active">進行中 剩 ${mins} 分</span>`;
}

// 從包廂名稱自動偵測樓層（例如「包廂 6F-1」→「6F」）
// 支援格式：含 6F/5F/4F/3F/B1 等字串，或純數字則歸為「其他」
function getFloorFromName(roomName){
  const m=roomName.match(/(\d+F|B\d+)/i);
  return m?m[1].toUpperCase():'其他';
}
function getFloor(roomIndex){
  return getFloorFromName(ROOMS[roomIndex]||'');
}
// 動態產生樓層顏色（固定幾個常用樓層，其他用灰色）
const FLOOR_COLOR_MAP={
  '6F':{bg:'#534AB7',text:'#ffffff',light:'#EEEDFE'},
  '5F':{bg:'#3B6D11',text:'#ffffff',light:'#EAF3DE'},
  '4F':{bg:'#7C3E0E',text:'#ffffff',light:'#FAEEDA'},
  '3F':{bg:'#534AB7',text:'#ffffff',light:'#EEEDFE'},
  'B1':{bg:'#444441',text:'#ffffff',light:'#F1EFE8'},
  '其他':{bg:'#666',text:'#ffffff',light:'#f0f0f0'},
};
function getFloorColor(floor){
  return FLOOR_COLOR_MAP[floor]||{bg:'#555',text:'#ffffff',light:'#eee'};
}
// 取得目前 ROOMS 中出現的樓層，保持順序
function getFloorGroups(){
  const seen=new Set();
  const groups=[];
  ROOMS.forEach((room,i)=>{
    const f=getFloor(i);
    if(!seen.has(f)){seen.add(f);groups.push(f);}
  });
  return groups;
}

function buildCards(){
  const container=document.getElementById('slotCards');let html='';

  // 手機版排序：超時/進行中/警示 → 待開始 → 已結束
  const statusOrder={'overtime':0,'warn15':1,'warn30':2,'active':3,'upcoming':4,'done':5};
  const sortedSlots=[...SLOTS].sort((a,b)=>{
    const sa=slotStatus(a),sb=slotStatus(b);
    const oa=statusOrder[sa]??6,ob=statusOrder[sb]??6;
    if(oa!==ob)return oa-ob;
    // 同狀態下維持原本時間順序
    return SLOTS.indexOf(a)-SLOTS.indexOf(b);
  });

  sortedSlots.forEach(slot=>{
    const st=slotStatus(slot);        // 用於排序和格子狀態
    const stRaw=slotStatusRaw(slot);  // 用於卡片標頭顯示（原始場次時間）
    // 手機版卡片閃爍狀態（含第二輪）
    const hasOtRoom=ROOMS.some(room=>{
      const k=key(room,slot);
      const r1=(assignments[k]&&!returned[k]&&roomStatus(slot,k)==='overtime');
      const r2=(assignments2[k]&&!returned2[k]&&roomStatus(slot,k)==='overtime');
      return r1||r2;
    });
    const hasW15Room=ROOMS.some(room=>{
      const k=key(room,slot);
      const r1=(assignments[k]&&!returned[k]&&roomStatus(slot,k)==='warn15');
      const r2=(assignments2[k]&&!returned2[k]&&roomStatus(slot,k)==='warn15');
      return r1||r2;
    });
    const hasW30Room=ROOMS.some(room=>{
      const k=key(room,slot);
      const r1=(assignments[k]&&!returned[k]&&roomStatus(slot,k)==='warn30');
      const r2=(assignments2[k]&&!returned2[k]&&roomStatus(slot,k)==='warn30');
      return r1||r2;
    });
    let cardCls='slot-card';
    if(hasOtRoom)cardCls+=' card-ot';
    else if(hasW15Room)cardCls+=' card-w15';
    else if(hasW30Room)cardCls+=' card-w30';
    html+=`<div class="${cardCls}"><div class="slot-header"><span class="slot-time-m">${slot}</span>${badgeFor(stRaw,slot)}</div>`;

    // 手機版：按樓層分區顯示（從包廂名稱自動偵測樓層）
    const floors=getFloorGroups();
    floors.forEach(floor=>{
      const fc=getFloorColor(floor);
      const floorRooms=ROOMS.map((r,i)=>({r,i})).filter(({i})=>getFloor(i)===floor);
      if(floorRooms.length===0)return;
      html+=`<div style="border-top:1px solid #eee;">
        <div style="background:${fc.bg};color:${fc.text};font-size:11px;font-weight:600;padding:4px 12px;letter-spacing:.5px;">${floor}</div>
        <div class="slot-rooms">`;
      floorRooms.forEach(({r:room,i})=>{
        const k=key(room,slot);const sid=assignments[k];const sid2=assignments2[k];
        if(sid||sid2){
          const isRet=returned[k]||false;
          const isRet2=returned2[k]||false;

          function mCellContent(sidX,sfX,clX,isRetX){
            const sx=STORES.find(x=>x.id===sidX);

            const cp=[];
            if(clX.clientName)cp.push(`<span class="client-lbl-m">Name: ${clX.clientName}</span>`);
            if(clX.segment)cp.push(`<span class="client-lbl-m">Seg: ${clX.segment}</span>`);
            const sp=[];

            const infoTxt=(cp.length||sp.length)?`${cp.join('')}${cp.length&&sp.length?'<hr class="cell-divider-m"/>':''}${sp.join('')}`:'';
            const retTxt=isRetX?`<span class="done-lbl-m">已歸還</span>`:'';

            const nameSty=isRetX?'color:#aaa;':`color:${cx.text};`;
            return {sx,cx,cellSty,nameSty,infoTxt,retTxt};

          if(sid&&!sid2){
            // 單輪

            let rCls='room-cell has-store';
            if(isRet)rCls+=' cell-done';

            let rCls='room-cell has-store';
            if(rst==='overtime')rCls+=' cell-ot';

            html+=`<div class="${rCls}" style="${border2}border-radius:8px;overflow:hidden;background:#fff;">

              <div style="font-size:9px;font-weight:600;padding:3px 8px;background:#e8e8e8;color:#777;display:flex;justify-content:space-between;cursor:pointer;" onclick="toggleRoundV('${uid2}',1)">

                <span>第二輪 · ${s2?s2.name:''} · ${r2status}</span><span id="vh2-${uid2}" class="chv">▾</span>

          }
        }else{html+=`<div class="room-cell"><span class="room-empty">${room}</span></div>`;}
      });
      html+=`</div></div>`;
    });
    html+='</div>';
  });
  container.innerHTML=html;
}

            ${sf.ca?`🧑‍💼 ${sf.ca}<br>`:''}
            ${sf.expert?`💡 ${sf.expert}<br>`:''}
            ${sf.runner?`🏃 ${sf.runner}`:''}
          </div>`;
        ml.appendChild(card);
      });
    }
  }
}
window.showMobileQueue=()=>{
  document.getElementById('mobileQueueBtn').style.display='none';
  document.getElementById('slotCards').style.display='none';
  document.getElementById('mobileQueueView').style.display='block';
};
window.hideMobileQueue=()=>{
  document.getElementById('mobileQueueBtn').style.display='block';
  document.getElementById('slotCards').style.display='block';
  document.getElementById('mobileQueueView').style.display='none';
};

function tick(){
  const total=Object.keys(assignments).length+Object.keys(assignments2).length;
  document.getElementById('emptyNotice').style.display=total===0?'block':'none';
  buildTable();buildCards();updateAlert();updateClock();updateSlotLabels();buildTokenDisplay();
}
// 輕量更新：每3秒更新時間、警示、手機卡片排序
function updateCellStyles(){
  SLOTS.forEach(slot=>{
    ROOMS.forEach(room=>{
      const k=key(room,slot);
      const sid=assignments[k];
      const sid2=assignments2[k];
      if(!sid&&!sid2)return;
      const isRet=returned[k]||false;
      const isRet2=returned2[k]||false;
      // 兩輪都歸還，或只有第一輪且已歸還 → 不閃爍
      if(isRet&&(!sid2||isRet2))return;
      const rst=roomStatus(slot,k);
      const cell=document.querySelector(`.cell[data-k="${CSS.escape(k)}"]`);
      if(!cell)return;
      cell.classList.remove('cell-ot','cell-w15','cell-w30','cell-done');
      if(rst==='overtime')cell.classList.add('cell-ot');
      else if(rst==='warn15')cell.classList.add('cell-w15');
      else if(rst==='warn30')cell.classList.add('cell-w30');
    });
  });
}

function lightTick(){updateAlert();updateClock();updateSlotLabels();buildTable();buildCards();updateCellStyles();buildTokenDisplay();buildQueueView();}

onValue(dbRef,snap=>{
  document.getElementById('syncDot').className='sync-dot connected';
  document.getElementById('syncStatus').style.color='';
  document.getElementById('syncStatus').textContent='即時同步中';
  const d=snap.val();
  if(!d){document.getElementById('emptyNotice').style.display='block';return;}
  if(d.slots?.length)SLOTS=d.slots;
  if(d.rooms?.length)ROOMS=d.rooms;
  if(d.stores?.length)STORES=d.stores;
  assignments=d.assignments||{};
  returned=d.returned||{};
  staff=d.staff||{};
  tokens=d.tokens||{};
  clients=d.clients||{};
  assignments2=d.assignments2||{};
  staff2=d.staff2||{};
  clients2=d.clients2||{};
  returned2=d.returned2||{};
  queue=d.queue||[];
  tick();buildTokenDisplay();buildQueueView();
});

function buildTokenDisplay(){
  const lent=Object.entries(tokens).reduce((s,[k,v])=>{
    if(typeof v!=='number')return s;
    return s+v;
  },0);
  const hasAny=lent>0;
  const display=document.getElementById('tokenDisplay');
  display.style.display=hasAny?'block':'none';
  if(!hasAny)return;
  document.getElementById('tokenViewSummary').innerHTML=`
    <div style="padding:6px 14px;border-radius:8px;background:#FAEEDA;border:1px solid #BA7517;color:#633806;text-align:center;">
      <span style="font-size:18px;font-weight:700;display:block;">${lent}</span>
      <span style="font-size:11px;">已借出</span>
    </div>`;
  const grid=document.getElementById('tokenViewGrid');
  grid.innerHTML='';
  // 直接遍歷 tokens，顯示所有數字類型的 key
  Object.entries(tokens).forEach(([k,cnt])=>{
    if(typeof cnt!=='number'||cnt<=0)return;
    if(k==='__other_count__'){
      const note=tokens['__other_note__']||'其他';
      const borrower=tokens['__other_borrower__']||'';
      const chip=document.createElement('div');
      chip.style.cssText='padding:8px 14px;background:#fff;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#1a1a1a;';
      chip.innerHTML=`${note}：<strong>${cnt} 顆</strong>${borrower?` · ${borrower}`:''}`;
      grid.appendChild(chip);
      return;
    }
    // 找對應的完整包廂名稱（從ROOMS）
    const borrower=tokens[k+'__borrower__']||'';
    const label=ROOMS.find(r=>r===k||r.replace(/[.#$/[\]\s]/g,'_')===k)||k;
    const chip=document.createElement('div');
    chip.style.cssText='padding:8px 14px;background:#fff;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#1a1a1a;';
    chip.innerHTML=`${label}：<strong>${cnt} 顆</strong>${borrower?` · ${borrower}`:''}`;
    grid.appendChild(chip);
  });
}

tick();
setInterval(lightTick,3000);
setInterval(updateClock,1000);
</script>
