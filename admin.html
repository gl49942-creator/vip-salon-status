<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Salon Status — 管理員</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0ee;color:#1a1a1a;padding:36px;}
h1{font-size:28px;font-weight:600;margin-bottom:6px;letter-spacing:.5px;}
.admin-badge{display:inline-block;background:#E1F5EE;border:1px solid #0F6E56;color:#085041;font-size:13px;font-weight:500;padding:4px 12px;border-radius:12px;margin-bottom:16px;}
.sync-bar{display:flex;align-items:center;gap:8px;font-size:13px;color:#888;margin-bottom:22px;}
.sync-dot{width:9px;height:9px;border-radius:50%;background:#ccc;flex-shrink:0;}
.sync-dot.connected{background:#1D9E75;}
.sync-dot.saving{background:#EF9F27;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* Settings */
.settings-toggle{font-size:13px;color:#378add;cursor:pointer;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px;background:none;border:none;font-family:inherit;padding:0;}
.settings-panel{background:#fff;border:1px solid #ddd;border-radius:10px;padding:20px;margin-bottom:24px;display:none;}
.settings-panel.open{display:block;}
.settings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}
.settings-section h3{font-size:13px;font-weight:500;color:#555;margin-bottom:10px;}
.slot-row,.store-row,.room-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.slot-row input,.store-row input,.room-row input{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;}
.del-btn{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;background:#fff;color:#999;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.del-btn:hover{background:#fee;border-color:#E24B4A;color:#E24B4A;}
.add-btn{font-size:12px;color:#378add;background:none;border:1px dashed #378add;border-radius:6px;padding:5px 12px;cursor:pointer;margin-top:4px;font-family:inherit;}
.apply-btn{background:#1F2D45;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:14px;cursor:pointer;margin-top:16px;font-family:inherit;}
.apply-btn:hover{background:#2a3d5c;}

/* Legend */
.legend-label{font-size:14px;font-weight:500;color:#555;margin-bottom:10px;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.store-chip{padding:8px 18px;border-radius:20px;font-size:14px;font-weight:500;cursor:grab;user-select:none;border:1.5px solid transparent;}
.store-chip:active{cursor:grabbing;opacity:0.8;}
.actions{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.action-btn{padding:9px 20px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:14px;cursor:pointer;font-family:inherit;}
.action-btn:hover{background:#f0f0f0;}
.btn-export{background:#1F2D45;color:#fff;border-color:#1F2D45;}
.btn-export:hover{background:#2a3d5c;}
.tip{font-size:12px;color:#aaa;margin-bottom:14px;}

/* Grid */
.grid-wrap{overflow-x:auto;border-radius:12px;border:1px solid #ccc;background:#fff;box-shadow:0 2px 16px rgba(0,0,0,.08);}
table{width:100%;border-collapse:collapse;min-width:1100px;table-layout:fixed;}
thead th{background:#2C3E6B;color:#ffffff;font-size:15px;font-weight:600;letter-spacing:.3px;padding:18px 14px;text-align:center;border-right:1px solid #3d5080;}
thead th:first-child{text-align:center;min-width:150px;border-right:2px solid #3d5080;}
thead th:last-child{border-right:none;}
tbody tr{border-bottom:1px solid #e0e0e0;}
tbody tr:last-child{border-bottom:none;}
tbody tr:nth-child(even){background:#fafafa;}
tbody td{border-right:1px solid #e8e8e8;padding:5px;vertical-align:top;height:120px;}
tbody td:first-child{padding:8px 14px;background:#EEF1F8;text-align:center;vertical-align:middle;white-space:nowrap;border-right:2px solid #c8cfe0;width:150px;}
tbody td:last-child{border-right:none;}
.slot-label{display:flex;flex-direction:column;align-items:center;gap:4px;}
.slot-time-txt{font-size:15px;font-weight:700;color:#2C3E6B;}
.slot-countdown{font-size:11px;font-weight:500;padding:2px 8px;border-radius:8px;white-space:nowrap;margin-top:1px;}
.sc-active{background:#E1F5EE;color:#085041;}
.sc-warn30{background:#FAEEDA;color:#633806;animation:flashMed 1.8s infinite;}
.sc-warn15{background:#E24B4A;color:#fff;animation:flashSlow 1.2s infinite;}
.sc-ot{background:#A32D2D;color:#fff;animation:flashFast .8s infinite;}
.sc-up{background:#eee;color:#888;}
.sc-done{background:#f0f0f0;color:#bbb;}
@keyframes flashFast{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes flashSlow{0%,100%{opacity:1;}50%{opacity:.55;}}
@keyframes flashMed{0%,100%{opacity:1;}50%{opacity:.65;}}
.cell{min-height:108px;border-radius:10px;border:1.5px dashed #ddd;display:flex;align-items:center;justify-content:center;font-size:12px;color:#bbb;transition:background 0.15s;position:relative;}
.cell.drag-over{background:#e8f0fb;border-color:#378add;border-style:solid;}
.cell.filled{border-style:solid;border-color:transparent;}
.assigned{padding:5px 7px;border-radius:8px;font-size:12px;font-weight:600;width:100%;text-align:center;cursor:grab;position:relative;line-height:1.3;display:flex;flex-direction:column;align-items:center;gap:2px;}
.assigned:active{cursor:grabbing;}
.store-label{font-size:13px;font-weight:600;}
.ext-badge{font-size:10px;font-weight:600;padding:1px 7px;border-radius:8px;background:rgba(0,0,0,.12);color:inherit;margin-top:1px;}
.remove-btn{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#E24B4A;color:white;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.15s;border:none;line-height:1;padding:0;}
.extend-btn{position:absolute;bottom:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#185FA5;color:white;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.15s;border:none;line-height:1;padding:0;font-weight:700;}
.return-btn{position:absolute;bottom:-6px;left:-6px;width:18px;height:18px;border-radius:50%;background:#1D9E75;color:white;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.15s;border:none;line-height:1;padding:0;font-weight:700;}
.return-btn.unreturned{background:#888;}
.staff-btn{position:absolute;top:-6px;left:-6px;width:18px;height:18px;border-radius:50%;background:#BA7517;color:white;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.15s;border:none;line-height:1;padding:0;}
.cell:hover .remove-btn,.assigned:hover .remove-btn,
.cell:hover .extend-btn,.assigned:hover .extend-btn,
.cell:hover .return-btn,.assigned:hover .return-btn,
.cell:hover .staff-btn,.assigned:hover .staff-btn{opacity:1;}
.ret-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:6px;background:#e0e0e0;color:#888;}
.staff-badge{font-size:10px;font-weight:500;padding:2px 6px;border-radius:6px;background:rgba(0,0,0,.08);color:inherit;display:block;margin-top:2px;line-height:1.6;text-align:left;}

.token-card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px 14px;min-width:160px;display:flex;flex-direction:column;gap:6px;}
.token-room{font-size:13px;font-weight:600;color:#2C3E6B;}
.token-controls{display:flex;align-items:center;gap:8px;}
.token-btn{width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:#f5f5f5;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1;color:#333;flex-shrink:0;}
.token-btn:hover{background:#e0e0e0;}
.token-count{font-size:20px;font-weight:700;color:#1F2D45;min-width:24px;text-align:center;}
.token-label{font-size:11px;color:#aaa;}
.token-summary-box{padding:8px 16px;border-radius:10px;text-align:center;}
.ts-lent{background:#FAEEDA;border:1px solid #BA7517;color:#633806;}
.ts-remain{background:#E1F5EE;border:1px solid #0F6E56;color:#085041;}
.ts-num{font-size:20px;font-weight:700;display:block;}
.ts-lbl{font-size:11px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:24px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal h3{font-size:16px;font-weight:600;margin-bottom:6px;}
.modal p{font-size:13px;color:#888;margin-bottom:16px;}
.modal-btns{display:flex;flex-direction:column;gap:8px;}
.ext-opt{padding:10px 16px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:14px;font-weight:500;cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;}
.ext-opt:hover{background:#e8f0fb;border-color:#185FA5;color:#0C447C;}
.ext-cancel{padding:9px;border-radius:8px;border:none;background:#f0f0f0;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px;}
.ext-cancel:hover{background:#e0e0e0;}
</style>
</head>
<body>
<h1>VIP SALON STATUS</h1>

<div class="admin-badge">✎ 管理員模式</div>
<div class="sync-bar"><div class="sync-dot" id="syncDot"></div><span id="syncStatus">連線中...</span></div>

<button class="settings-toggle" onclick="toggleSettings()">⚙️ 自訂時段 / 包廂 / 店鋪設定</button>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-grid">
    <div class="settings-section">
      <h3>時段設定</h3><div id="slotList"></div>
      <button class="add-btn" onclick="addSlot()">＋ 新增時段</button>
    </div>
    <div class="settings-section">
      <h3>包廂名稱設定</h3><div id="roomList"></div>
      <button class="add-btn" onclick="addRoom()">＋ 新增包廂</button>
    </div>
    <div class="settings-section">
      <h3>店鋪設定</h3><div id="storeList"></div>
      <button class="add-btn" onclick="addStore()">＋ 新增店鋪</button>
    </div>
  </div>
  <button class="apply-btn" onclick="applySettings()">套用設定並重新產生表格</button>
</div>

<div class="legend-label">店鋪列表（拖拉至格子進行分配）</div>
<div class="legend" id="legend"></div>
<p class="tip">拖拉店鋪至格子分配；✕ 移除；＋ 延長時間</p>
<div class="actions">
  <button class="action-btn" onclick="clearAll()">全部清除</button>
  <button class="action-btn btn-export" onclick="exportExcel()">📥 匯出報表</button>
</div>
<div class="grid-wrap"><table id="grid"></table></div>

<!-- TOKEN 借用管理 -->
<div style="margin-top:32px;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
    <div>
      <div style="font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:2px;">🎫 13號備用TOKEN 借用管理</div>
      <div style="font-size:13px;color:#888;">總數量：5 顆</div>
    </div>
    <div id="tokenSummary" style="display:flex;gap:12px;"></div>
  </div>
  <div id="tokenGrid" style="display:flex;flex-wrap:wrap;gap:10px;"></div>
</div>

<!-- Extend modal -->
<div class="modal-overlay" id="extModal">
  <div class="modal">
    <h3>延長使用時間</h3>
    <p id="extModalDesc">選擇延長時間</p>
    <div class="modal-btns">
      <button class="ext-opt" onclick="confirmExtend(15)">延長 15 分鐘</button>
      <button class="ext-opt" onclick="confirmExtend(30)">延長 30 分鐘</button>
      <button class="ext-opt" onclick="confirmExtend(45)">延長 45 分鐘</button>
      <button class="ext-opt" onclick="confirmExtend(60)">延長 60 分鐘</button>
      <button class="ext-cancel" onclick="closeExtModal()">取消</button>
    </div>
  </div>
</div>

<!-- Staff modal -->
<div class="modal-overlay" id="staffModal">
  <div class="modal">
    <h3>填寫服務人員</h3>
    <p id="staffModalDesc" style="font-size:13px;color:#888;margin-bottom:16px;"></p>
    <div style="margin-bottom:12px;">
      <label style="font-size:13px;font-weight:500;color:#444;display:block;margin-bottom:6px;">Expert</label>
      <input id="expertInput" type="text" placeholder="輸入 Expert 姓名" style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;outline:none;" onfocus="this.style.borderColor='#185FA5'" onblur="this.style.borderColor='#ddd'"/>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:13px;font-weight:500;color:#444;display:block;margin-bottom:6px;">Runner</label>
      <input id="runnerInput" type="text" placeholder="輸入 Runner 姓名" style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;outline:none;" onfocus="this.style.borderColor='#185FA5'" onblur="this.style.borderColor='#ddd'"/>
    </div>
    <div style="margin-bottom:16px;">
      <label style="font-size:13px;font-weight:500;color:#444;display:block;margin-bottom:6px;">CA</label>
      <input id="caInput" type="text" placeholder="輸入 CA 姓名" style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;outline:none;" onfocus="this.style.borderColor='#185FA5'" onblur="this.style.borderColor='#ddd'"/>
    </div>
    <div class="modal-btns">
      <button class="ext-opt" onclick="confirmStaff()" style="text-align:center;background:#1F2D45;color:#fff;border:none;">儲存</button>
      <button class="ext-cancel" onclick="closeStaffModal()">取消</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,onValue,get}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const app=initializeApp({apiKey:"AIzaSyB4ywZ1LfnE8M2XT41yrCxl4_a-jYdwQn8",authDomain:"vip-room-scheduler.firebaseapp.com",databaseURL:"https://vip-room-scheduler-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"vip-room-scheduler",storageBucket:"vip-room-scheduler.firebasestorage.app",messagingSenderId:"1064515548287",appId:"1:1064515548287:web:11f5ab1537cbc60371bb4a"});
const db=getDatabase(app),dbRef=ref(db,'scheduler');
// 偵測連線狀態
onValue(ref(db,'.info/connected'),snap=>{
  if(!snap.val()){
    const dot=document.getElementById('syncDot');
    dot.className='sync-dot';
    document.getElementById('syncStatus').textContent='連線中斷，請確認網路...';
    document.getElementById('syncStatus').style.color='#E24B4A';
  }
});

const COLORS=[{bg:'#E6F1FB',border:'#185FA5',text:'#0C447C'},{bg:'#E1F5EE',border:'#0F6E56',text:'#085041'},{bg:'#FAEEDA',border:'#BA7517',text:'#633806'},{bg:'#FAECE7',border:'#993C1D',text:'#712B13'},{bg:'#EEEDFE',border:'#534AB7',text:'#3C3489'},{bg:'#FBEAF0',border:'#993556',text:'#72243E'},{bg:'#EAF3DE',border:'#3B6D11',text:'#27500A'},{bg:'#F1EFE8',border:'#5F5E5A',text:'#444441'},{bg:'#FCEBEB',border:'#A32D2D',text:'#791F1F'},{bg:'#E8F8FA',border:'#0A7C8C',text:'#055562'}];
let SLOTS=['11:00–13:00','13:00–15:00','15:00–17:00','17:00–19:00','19:00–21:00'];
let ROOMS=Array.from({length:9},(_,i)=>`包廂 ${i+1}`);
let STORES=[{id:'ksh',name:'HSM'},{id:'ksha',name:'Arena'},{id:'tch',name:'TCH'},{id:'tnn',name:'TN'},{id:'101',name:'TPE 101'},{id:'a3',name:'A3'},{id:'lvb',name:'LVB'},{id:'sogo',name:'SOGO'}];
let assignments={};   // {key: storeId}
let extensions={};    // {key: extraMinutes}
let returned={};      // {key: bool}
let staff={};         // {key: {expert, runner, ca}}
let tokens={};        // {roomName: count}
const TOKEN_TOTAL=5;
let dragStore=null,dragFrom=null,isSyncing=false;
let pendingExtKey=null;

const color=id=>COLORS[STORES.findIndex(s=>s.id===id)%COLORS.length]||COLORS[0];
const key=(r,s)=>`${r}||${s}`;

function setSyncStatus(s){
  const dot=document.getElementById('syncDot'),txt=document.getElementById('syncStatus');
  if(s==='connected'){dot.className='sync-dot connected';txt.textContent='已連線，變更即時同步';}
  else if(s==='saving'){dot.className='sync-dot saving';txt.textContent='儲存中...';}
  else{dot.className='sync-dot';txt.textContent='連線中...';}
}
function push(){
  isSyncing=true;setSyncStatus('saving');
  set(dbRef,{assignments,extensions,returned,staff,tokens,slots:SLOTS,rooms:ROOMS,stores:STORES}).then(()=>{setSyncStatus('connected');isSyncing=false;});
}
onValue(dbRef,snap=>{
  if(isSyncing)return;
  const d=snap.val();if(!d){setSyncStatus('connected');return;}
  if(d.slots?.length)SLOTS=d.slots;
  if(d.rooms?.length)ROOMS=d.rooms;
  if(d.stores?.length)STORES=d.stores;
  assignments=d.assignments||{};
  extensions=d.extensions||{};
  returned=d.returned||{};
  staff=d.staff||{};
  tokens=d.tokens||{};
  setSyncStatus('connected');buildAll();buildTokenSection();
});

// Settings
window.toggleSettings=()=>{const p=document.getElementById('settingsPanel');p.classList.toggle('open');if(p.classList.contains('open'))renderPanel();};
function renderPanel(){
  document.getElementById('slotList').innerHTML=SLOTS.map((s,i)=>`<div class="slot-row"><input value="${s}" id="slot-${i}"/><button class="del-btn" onclick="removeSlot(${i})">✕</button></div>`).join('');
  document.getElementById('roomList').innerHTML=ROOMS.map((r,i)=>`<div class="room-row"><input value="${r}" id="room-${i}"/><button class="del-btn" onclick="removeRoom(${i})">✕</button></div>`).join('');
  document.getElementById('storeList').innerHTML=STORES.map((s,i)=>`<div class="store-row"><input value="${s.name}" id="store-${i}"/><button class="del-btn" onclick="removeStore(${i})">✕</button></div>`).join('');
}
window.addSlot=()=>{SLOTS.push('');renderPanel();document.getElementById(`slot-${SLOTS.length-1}`).focus();};
window.removeSlot=i=>{SLOTS.splice(i,1);renderPanel();};
window.addRoom=()=>{ROOMS.push(`包廂 ${ROOMS.length+1}`);renderPanel();document.getElementById(`room-${ROOMS.length-1}`).focus();};
window.removeRoom=i=>{ROOMS.splice(i,1);renderPanel();};
window.addStore=()=>{STORES.push({id:'store_'+Date.now(),name:''});renderPanel();document.getElementById(`store-${STORES.length-1}`).focus();};
window.removeStore=i=>{STORES.splice(i,1);renderPanel();};
window.applySettings=()=>{
  const oldSlots=[...SLOTS],oldRooms=[...ROOMS];
  SLOTS=Array.from(document.querySelectorAll('[id^="slot-"]')).map(el=>el.value.trim()).filter(Boolean);
  ROOMS=Array.from(document.querySelectorAll('[id^="room-"]')).map(el=>el.value.trim()).filter(Boolean);
  STORES=STORES.map((s,i)=>{const el=document.getElementById(`store-${i}`);return el?{...s,name:el.value.trim()||s.name}:s;}).filter(s=>s.name);

  // 只清除已不存在的 slot 或 room 的資料，保留有效的
  const validKeys=new Set();
  SLOTS.forEach(slot=>ROOMS.forEach(room=>validKeys.add(key(room,slot))));
  [assignments,extensions,returned,staff].forEach(obj=>{
    Object.keys(obj).forEach(k=>{if(!validKeys.has(k))delete obj[k];});
  });
  // TOKEN：只保留還存在的包廂
  Object.keys(tokens).forEach(room=>{if(!ROOMS.includes(room))delete tokens[room];});

  // 處理包廂改名：舊名稱→新名稱（依 index 對應）
  const renameMap={};
  oldRooms.forEach((oldName,i)=>{if(ROOMS[i]&&ROOMS[i]!==oldName)renameMap[oldName]=ROOMS[i];});
  if(Object.keys(renameMap).length>0){
    [assignments,extensions,returned,staff].forEach(obj=>{
      Object.keys(obj).forEach(k=>{
        const[room,slot]=k.split('||');
        if(renameMap[room]){
          const newK=key(renameMap[room],slot);
          obj[newK]=obj[k];
          delete obj[k];
        }
      });
    });
    // TOKEN 改名
    Object.keys(renameMap).forEach(oldName=>{
      if(tokens[oldName]!==undefined){
        tokens[renameMap[oldName]]=tokens[oldName];
        delete tokens[oldName];
      }
    });
  }

  document.getElementById('settingsPanel').classList.remove('open');
  buildAll();push();
};

// Extend modal
window.openExtModal=function(k,storeName,slot){
  pendingExtKey=k;
  document.getElementById('extModalDesc').textContent=`${storeName}　${slot}`;
  document.getElementById('extModal').classList.add('open');
};
window.closeExtModal=()=>{document.getElementById('extModal').classList.remove('open');pendingExtKey=null;};
window.confirmExtend=mins=>{
  if(!pendingExtKey)return;
  extensions[pendingExtKey]=(extensions[pendingExtKey]||0)+mins;
  closeExtModal();render();push();
};

function buildLegend(){
  const el=document.getElementById('legend');el.innerHTML='';
  STORES.forEach(s=>{
    const c=color(s.id),chip=document.createElement('div');
    chip.className='store-chip';chip.draggable=true;chip.textContent=s.name;
    chip.style.cssText=`background:${c.bg};border-color:${c.border};color:${c.text}`;
    chip.addEventListener('dragstart',e=>{dragStore=s.id;dragFrom=null;e.dataTransfer.effectAllowed='copy';});
    el.appendChild(chip);
  });
}

function parseSlot(slot){
  const parts=slot.replace(/[–—-]/,'|').split('|');
  if(parts.length<2)return null;
  const[sh,sm]=(parts[0].trim()+':00').split(':').map(Number);
  const[eh,em]=(parts[1].trim()+':00').split(':').map(Number);
  return{startH:sh,startM:sm||0,endH:eh,endM:em||0};
}
function slotTimeStatus(slot){
  const p=parseSlot(slot);if(!p)return{st:'upcoming',mins:null};
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const startMs=base.getTime()+(p.startH*60+p.startM)*60*1000;
  const endMs=base.getTime()+(p.endH*60+p.endM)*60*1000;
  if(now.getTime()<startMs)return{st:'upcoming',mins:null};
  const msToEnd=endMs-now.getTime();
  if(msToEnd<0){
    const si=SLOTS.indexOf(slot);
    const hasUnreturned=ROOMS.some(room=>{
      const k=key(room,slot);
      return assignments[k]&&!returned[k];
    });
    if(!hasUnreturned){
      if(si===SLOTS.length-1)return{st:'done',mins:null}; // 最後場次
      const nextP=parseSlot(SLOTS[si+1]);
      if(nextP){
        const nextStartMs=base.getTime()+(nextP.startH*60+nextP.startM)*60*1000;
        if(now.getTime()>=nextStartMs)return{st:'done',mins:null};
      }
    }
    return{st:'overtime',mins:Math.abs(Math.round(msToEnd/60000))};
  }
  const mins=Math.round(msToEnd/60000);
  if(mins<=15)return{st:'warn15',mins};
  if(mins<=30)return{st:'warn30',mins};
  return{st:'active',mins};
}
function slotCountdownHTML(slot){
  const{st,mins}=slotTimeStatus(slot);
  if(st==='upcoming')return`<span class="slot-countdown sc-up">待開始</span>`;
  if(st==='active')return`<span class="slot-countdown sc-active">進行中 剩 ${mins} 分</span>`;
  if(st==='warn30')return`<span class="slot-countdown sc-warn30">⚠ 剩 ${mins} 分鐘</span>`;
  if(st==='warn15')return`<span class="slot-countdown sc-warn15">⚠ 剩 ${mins} 分鐘</span>`;
  if(st==='overtime')return`<span class="slot-countdown sc-ot">🚨 已超時 ${mins} 分</span>`;
  return`<span class="slot-countdown sc-done">已結束</span>`;
}
function updateSlotLabels(){
  SLOTS.forEach(slot=>{
    const el=document.getElementById(`slotlbl-${encodeURIComponent(slot)}`);
    if(el)el.innerHTML=slotCountdownHTML(slot);
  });
}

// 從包廂名稱自動偵測樓層
function getFloorFromName(roomName){
  const m=roomName.match(/(\d+F|B\d+)/i);
  return m?m[1].toUpperCase():'其他';
}
function getFloor(i){return getFloorFromName(ROOMS[i]||'');}
const FLOOR_COLOR_MAP={
  '6F':{bg:'#534AB7',text:'#ffffff'},
  '5F':{bg:'#3B6D11',text:'#ffffff'},
  '4F':{bg:'#7C3E0E',text:'#ffffff'},
  '3F':{bg:'#534AB7',text:'#ffffff'},
  'B1':{bg:'#444441',text:'#ffffff'},
  '其他':{bg:'#666',text:'#ffffff'},
};
function getFloorColor(f){return FLOOR_COLOR_MAP[f]||{bg:'#555',text:'#ffffff'};}
const FLOOR_COLORS=FLOOR_COLOR_MAP;

function buildGrid(){
  const tbl=document.getElementById('grid');
  // 雙行表頭：樓層 + 包廂名稱
  const floorSpans={};
  ROOMS.forEach((_,i)=>{const f=getFloor(i);floorSpans[f]=(floorSpans[f]||0)+1;});
  let floorRow='<tr><th rowspan="2" style="background:#2C3E6B;color:#fff;font-size:14px;font-weight:600;text-align:center;border-right:2px solid #3d5080;vertical-align:middle;padding:10px 14px;">時段 / 包廂</th>';
  let roomRow='<tr>';
  const seenFloors=new Set();
  ROOMS.forEach((room,i)=>{
    const f=getFloor(i);
    const fc=getFloorColor(f);
    if(!seenFloors.has(f)){
      seenFloors.add(f);
      const borderL=i>0?'border-left:2px solid #3d5080;':'';
      floorRow+=`<th colspan="${floorSpans[f]}" style="background:${fc.bg};color:${fc.text};font-size:13px;font-weight:600;padding:8px 6px;text-align:center;${borderL}letter-spacing:.5px;">${f}</th>`;
    }
    const borderL=getFloor(i)!==getFloor(i-1)&&i>0?'border-left:2px solid #3d5080;':'';
    roomRow+=`<th style="background:#2C3E6B;color:#ffffff;font-size:13px;font-weight:600;padding:10px 8px;text-align:center;border-right:0.5px solid #3d5080;${borderL}">${room}</th>`;
  });
  floorRow+='</tr>';roomRow+='</tr>';

  let h=`<thead>${floorRow}${roomRow}</thead><tbody>`;
  SLOTS.forEach(slot=>{
    h+=`<tr><td><div class="slot-label"><span class="slot-time-txt">${slot}</span><span id="slotlbl-${encodeURIComponent(slot)}">${slotCountdownHTML(slot)}</span></div></td>`;
    ROOMS.forEach((room,i)=>{
      const borderL=getFloor(i)!==getFloor(i-1)&&i>0?'border-left:2px solid #c8cfe0;':'';
      h+=`<td style="${borderL}"><div class="cell" data-room="${encodeURIComponent(room)}" data-slot="${encodeURIComponent(slot)}"></div></td>`;
    });
    h+='</tr>';
  });
  tbl.innerHTML=h+'</tbody>';
  document.querySelectorAll('.cell').forEach(cell=>{
    cell.addEventListener('dragover',e=>{e.preventDefault();cell.classList.add('drag-over');});
    cell.addEventListener('dragleave',()=>cell.classList.remove('drag-over'));
    cell.addEventListener('dragenter',e=>e.preventDefault());
    cell.addEventListener('drop',e=>{
      e.preventDefault();cell.classList.remove('drag-over');if(!dragStore)return;
      const k=key(decodeURIComponent(cell.dataset.room),decodeURIComponent(cell.dataset.slot));
      if(dragFrom){delete assignments[dragFrom];delete extensions[dragFrom];delete returned[dragFrom];}
      assignments[k]=dragStore;dragStore=null;dragFrom=null;render();push();
    });
  });
}

function render(){
  document.querySelectorAll('.cell').forEach(cell=>{
    const room=decodeURIComponent(cell.dataset.room);
    const slot=decodeURIComponent(cell.dataset.slot);
    const k=key(room,slot);
    const sid=assignments[k];
    if(sid){
      const s=STORES.find(x=>x.id===sid);if(!s){delete assignments[k];cell.classList.remove('filled');cell.innerHTML='';return;}
      const c=color(sid);
      const ext=extensions[k]||0;
      const isReturned=returned[k]||false;
      const sf=staff[k]||{};
      // 計算延長剩餘時間
      let extLabel='';
      if(ext>0&&!isReturned){
        const p=parseSlot(slot);
        if(p){
          const now=new Date();
          const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
          const endMs=base.getTime()+(p.endH*60+p.endM+ext)*60*1000;
          const minsLeft=Math.round((endMs-now.getTime())/60000);
          if(minsLeft>0){
            extLabel=`<span class="ext-badge">申請延長${ext}分鐘 剩 ${minsLeft} 分</span>`;
          }else{
            extLabel=`<span class="ext-badge">申請延長${ext}分鐘（已到期）</span>`;
          }
        }
      }
      const sParts=[];
      if(sf.expert)sParts.push(`💡 ${sf.expert}`);
      if(sf.runner)sParts.push(`🏃 ${sf.runner}`);
      if(sf.ca)sParts.push(`🧑‍💼 ${sf.ca}`);
      const staffLabel=sParts.length>0?`<span class="staff-badge">${sParts.join('<br>')}</span>`:'';
      const retLabel=isReturned?`<span class="ret-badge">已歸還</span>`:'';
      const retStyle=isReturned?'opacity:.5;background:#f5f5f5;border:1.5px solid #ddd;color:#aaa;':'';
      cell.classList.add('filled');
      cell.innerHTML=`<div class="assigned" draggable="${isReturned?'false':'true'}" style="${retStyle||`background:${c.bg};border:2px solid ${c.border};color:${c.text};`}">
        <span class="store-label" style="${isReturned?'color:#aaa;':''}">${s.name}</span>
        ${extLabel}${staffLabel}${retLabel}
        <button class="remove-btn" onclick="removeCell('${k.replace(/'/g,"\\'")}',event)">✕</button>
        ${!isReturned?`<button class="extend-btn" onclick="openExtModal('${k.replace(/'/g,"\\'")}','${s.name}','${slot}',event)">＋</button>`:''}
        ${!isReturned?`<button class="staff-btn" onclick="openStaffModal('${k.replace(/'/g,"\\'")}','${s.name}','${slot}',event)" title="填寫 Expert / Runner">👤</button>`:''}
        <button class="return-btn ${isReturned?'unreturned':''}" onclick="toggleReturn('${k.replace(/'/g,"\\'")}',event)" title="${isReturned?'取消歸還':'標記已歸還'}">
          ${isReturned?'↩':'✓'}
        </button>
      </div>`;
      if(!isReturned){
        cell.querySelector('.assigned').addEventListener('dragstart',e=>{dragStore=sid;dragFrom=k;e.dataTransfer.effectAllowed='move';e.stopPropagation();});
      }
    }else{cell.classList.remove('filled');cell.innerHTML='';}
  });
}

window.removeCell=(k,e)=>{e.stopPropagation();delete assignments[k];delete extensions[k];delete returned[k];delete staff[k];render();push();};
window.toggleReturn=(k,e)=>{e.stopPropagation();returned[k]=!returned[k];render();push();};

// Staff modal
let pendingStaffKey=null;
window.openStaffModal=(k,storeName,slot,e)=>{
  if(e)e.stopPropagation();
  pendingStaffKey=k;
  document.getElementById('staffModalDesc').textContent=`${storeName}　${slot}`;
  const sf=staff[k]||{};
  document.getElementById('expertInput').value=sf.expert||'';
  document.getElementById('runnerInput').value=sf.runner||'';
  document.getElementById('caInput').value=sf.ca||'';
  document.getElementById('staffModal').classList.add('open');
  setTimeout(()=>document.getElementById('expertInput').focus(),100);
};
window.closeStaffModal=()=>{document.getElementById('staffModal').classList.remove('open');pendingStaffKey=null;};
window.confirmStaff=()=>{
  if(!pendingStaffKey)return;
  const expert=document.getElementById('expertInput').value.trim();
  const runner=document.getElementById('runnerInput').value.trim();
  const ca=document.getElementById('caInput').value.trim();
  if(expert||runner||ca){staff[pendingStaffKey]={expert,runner,ca};}
  else{delete staff[pendingStaffKey];}
  closeStaffModal();render();push();
};
window.clearAll=()=>{if(confirm('確定要清除所有分配嗎？')){assignments={};extensions={};returned={};staff={};tokens={};render();buildTokenSection();push();}};
function buildAll(){buildLegend();buildGrid();render();}

// ── TOKEN 借用管理 ──────────────────────────────
function totalLent(){
  return Object.entries(tokens).reduce((s,[k,v])=>{
    if(k==='__other_note__')return s; // 排除備註文字
    return s+(typeof v==='number'?v:0);
  },0);
}
function buildTokenSection(){
  const lent=totalLent();
  document.getElementById('tokenSummary').innerHTML=`
    <div class="token-summary-box ts-lent"><span class="ts-num">${lent}</span><span class="ts-lbl">已借出</span></div>`;
  const grid=document.getElementById('tokenGrid');
  grid.innerHTML='';
  ROOMS.forEach(room=>{
    const cnt=tokens[room]||0;
    const card=document.createElement('div');
    card.className='token-card';
    card.innerHTML=`
      <div class="token-room">${room}</div>
      <div class="token-controls">
        <button class="token-btn" data-room="${room}" data-delta="-1">－</button>
        <span class="token-count">${cnt}</span>
        <button class="token-btn" data-room="${room}" data-delta="1">＋</button>
      </div>
      <div class="token-label">${cnt>0?`已借 ${cnt} 顆`:'未借用'}</div>`;
    grid.appendChild(card);
  });

  // 「其他」卡片
  const otherCnt=tokens['__other_count__']||0;
  const otherNote=tokens['__other_note__']||'';
  const otherCard=document.createElement('div');
  otherCard.className='token-card';
  otherCard.style.minWidth='200px';
  otherCard.innerHTML=`
    <div class="token-room">其他</div>
    <input id="otherNoteInput" type="text" placeholder="說明（例：前台暫借）"
      value="${otherNote}"
      style="width:100%;padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit;margin-bottom:6px;outline:none;"
      onfocus="this.style.borderColor='#185FA5'" onblur="this.style.borderColor='#ddd'"/>
    <div class="token-controls">
      <button class="token-btn" data-room="__other__" data-delta="-1">－</button>
      <span class="token-count">${otherCnt}</span>
      <button class="token-btn" data-room="__other__" data-delta="1">＋</button>
    </div>
    <div class="token-label">${otherCnt>0?`已借 ${otherCnt} 顆`:'未借用'}</div>`;
  grid.appendChild(otherCard);

  // 備註欄輸入監聽
  const noteInput=document.getElementById('otherNoteInput');
  if(noteInput){
    noteInput.addEventListener('change',()=>{
      tokens['__other_note__']=noteInput.value.trim();
      push();
    });
  }

  // Event delegation
  grid.onclick=(e)=>{
    const btn=e.target.closest('[data-delta]');
    if(!btn)return;
    const room=btn.dataset.room;
    const delta=parseInt(btn.dataset.delta);
    adjustToken(room,delta);
  };
}
function adjustToken(room,delta){
  const key=room==='__other__'?'__other_count__':room;
  const cur=tokens[key]||0;
  const lent=totalLent();
  const next=cur+delta;
  if(next<0)return;
  if(delta>0&&lent>=TOKEN_TOTAL){alert('已達借用上限（5 顆）！');return;}
  if(next===0)delete tokens[key];
  else tokens[key]=next;
  buildTokenSection();push();
}

// 每3秒更新時段倒數標籤 + 格子內延長剩餘時間
setInterval(()=>{updateSlotLabels();render();},3000);
// 初始化 TOKEN 區域
buildTokenSection();

// ── 匯出報表 ──────────────────────────────
window.exportExcel=function(){
  const today=new Date();
  const dateStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const todayData={slots:SLOTS,rooms:ROOMS,stores:STORES,assignments,staff,extensions,returned,savedAt:new Date().toISOString()};
  if(typeof XLSX==='undefined'){alert('報表套件載入中，請稍後再試');return;}
  set(ref(db,`history/${dateStr}`),todayData).then(()=>{
    get(ref(db,'history')).then(snap=>{
      const history=snap.val()||{};
      const wb=XLSX.utils.book_new();
      const dates=Object.keys(history).sort();
      const rows=[['日期','時段','包廂','店鋪','Expert','Runner','CA','延長(分鐘)','已歸還']];
      dates.forEach(date=>{
        const d=history[date];if(!d)return;
        const slotList=d.slots||[],roomList=d.rooms||[],storeList=d.stores||[];
        const asgn=d.assignments||{},sfData=d.staff||{},extData=d.extensions||{},retData=d.returned||{};
        let dateShown=false;
        slotList.forEach(slot=>{
          let slotShown=false;
          roomList.forEach(room=>{
            const k=`${room}||${slot}`;
            const sid=asgn[k];if(!sid)return;
            const s=storeList.find(x=>x.id===sid);
            const sfInfo=sfData[k]||{};
            const extMins=extData[k]||0;
            const retVal=retData[k]?'✓':'';
            rows.push([dateShown?'':date,slotShown?'':slot,room,s?s.name:'',sfInfo.expert||'',sfInfo.runner||'',sfInfo.ca||'',extMins>0?extMins:'',retVal]);
            dateShown=true;slotShown=true;
          });
        });
        if(dateShown)rows.push([]);
      });
      if(rows.length<=1){alert('尚無資料可匯出');return;}
      const ws=XLSX.utils.aoa_to_sheet(rows);
      ws['!cols']=[{wch:12},{wch:18},{wch:10},{wch:12},{wch:12},{wch:12},{wch:12},{wch:10},{wch:8}];
      ws['!freeze']={xSplit:0,ySplit:1};
      XLSX.utils.book_append_sheet(wb,ws,'VIP Salon 全期紀錄');
      XLSX.writeFile(wb,'VIP_Salon_全期報表.xlsx');
    });
  }).catch(err=>{alert('儲存失敗，請確認網路連線');console.error(err);});
};
