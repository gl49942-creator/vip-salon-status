<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Salon Status — 管理員</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0ee;color:#1a1a1a;padding:36px;}
h1{font-size:28px;font-weight:600;margin:0;letter-spacing:.5px;}
.admin-badge{display:inline-block;background:#E1F5EE;border:1px solid #0F6E56;color:#085041;font-size:13px;font-weight:500;padding:4px 12px;border-radius:12px;}
.sync-bar{display:flex;align-items:center;gap:8px;font-size:13px;color:#888;}
.sync-dot{width:9px;height:9px;border-radius:50%;background:#ccc;flex-shrink:0;}
.sync-dot.connected{background:#1D9E75;}
.sync-dot.saving{background:#EF9F27;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* Settings */
.settings-toggle{font-size:13px;color:#378add;cursor:pointer;display:inline-flex;align-items:center;gap:6px;background:none;border:none;font-family:inherit;padding:0;}
.settings-panel{background:#fff;border:1px solid #ddd;border-radius:10px;padding:20px;margin-bottom:24px;display:none;}
.settings-panel.open{display:block;}
.settings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}
.settings-section h3{font-size:13px;font-weight:500;color:#555;margin-bottom:10px;}
.slot-row,.store-row,.room-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.slot-row input,.store-row input,.room-row input{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;}
.del-btn{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;background:#fff;color:#999;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.del-btn:hover{background:#fee;border-color:#E24B4A;color:#E24B4A;}
.add-btn{font-size:12px;color:#378add;background:none;border:1px dashed #378add;border-radius:6px;padding:5px 12px;cursor:pointer;margin-top:4px;font-family:inherit;}
.apply-btn{background:#1F2D45;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:14px;cursor:pointer;margin-top:16px;font-family:inherit;}
.apply-btn:hover{background:#2a3d5c;}

/* Legend */
.legend-label{font-size:14px;font-weight:500;color:#555;margin-bottom:10px;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.store-chip{padding:8px 18px;border-radius:20px;font-size:14px;font-weight:500;cursor:grab;user-select:none;border:1.5px solid transparent;}
.store-chip:active{cursor:grabbing;opacity:0.8;}
.actions{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.action-btn{padding:7px 16px;border:1px solid #D8D6D2;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;color:#444;display:inline-flex;align-items:center;gap:5px;}
.action-btn:hover{background:#f5f5f5;}
.action-btn:first-child{border-radius:8px 0 0 8px;}
.action-group{display:inline-flex;}
.action-group .action-btn{border-radius:0;border-left:none;}
.action-group .action-btn:last-child{border-radius:0 8px 8px 0;}
.btn-export{background:#1F2D45;color:#fff;border-color:#1F2D45;border-radius:8px;margin-right:8px;}
.btn-export:hover{background:#2a3d5c;}
.tip{font-size:12px;color:#aaa;margin-bottom:14px;}

/* Grid */
.grid-wrap{overflow-x:auto;border-radius:12px;border:1px solid #ccc;background:#fff;box-shadow:0 2px 16px rgba(0,0,0,.08);}
table{width:100%;border-collapse:collapse;min-width:1100px;table-layout:fixed;}
thead th{background:#2C3E6B;color:#ffffff;font-size:15px;font-weight:600;letter-spacing:.3px;padding:18px 14px;text-align:center;border-right:1px solid #3d5080;}
thead th:first-child{text-align:center;min-width:150px;border-right:2px solid #3d5080;}
thead th:last-child{border-right:none;}
tbody tr{border-bottom:1px solid #e0e0e0;}
tbody tr:last-child{border-bottom:none;}
tbody tr:nth-child(even){background:#fafafa;}
tbody td{border-right:1px solid #e8e8e8;padding:5px;vertical-align:top;}
tbody td:first-child{padding:8px 14px;background:#EEF1F8;text-align:center;vertical-align:middle;white-space:nowrap;border-right:2px solid #c8cfe0;width:150px;}
tbody td:last-child{border-right:none;}
.slot-label{display:flex;flex-direction:column;align-items:center;gap:4px;}
.slot-time-txt{font-size:15px;font-weight:700;color:#2C3E6B;}
.slot-countdown{font-size:11px;font-weight:500;padding:2px 8px;border-radius:8px;white-space:nowrap;margin-top:1px;}
.sc-active{background:#E1F5EE;color:#085041;}
.sc-warn30{background:#FAEEDA;color:#633806;animation:flashMed 1.8s infinite;}
.sc-warn15{background:#E24B4A;color:#fff;animation:flashSlow 1.2s infinite;}
.sc-ot{background:#A32D2D;color:#fff;animation:flashFast .8s infinite;}
.sc-up{background:#eee;color:#888;}
.sc-done{background:#f0f0f0;color:#bbb;}
@keyframes flashFast{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes flashSlow{0%,100%{opacity:1;}50%{opacity:.55;}}
@keyframes flashMed{0%,100%{opacity:1;}50%{opacity:.65;}}
.cell{min-height:130px;border-radius:10px;border:1.5px dashed #ddd;display:flex;align-items:center;justify-content:center;font-size:13px;color:#bbb;transition:background 0.15s;position:relative;}
.cell.drag-over{background:#e8f0fb;border-color:#378add;border-style:solid;}
.cell.filled{border-style:solid;border-color:transparent;}
.assigned{padding:9px 10px;border-radius:8px;width:100%;cursor:grab;position:relative;display:flex;flex-direction:column;gap:3px;}
.assigned:active{cursor:grabbing;}
.store-label{font-size:15px;font-weight:700;display:block;margin-bottom:3px;line-height:1.4;}
.remove-btn{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#E24B4A;color:white;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.15s;border:none;line-height:1;padding:0;}
.return-btn{position:absolute;bottom:-6px;left:-6px;width:18px;height:18px;border-radius:50%;background:#1D9E75;color:white;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.15s;border:none;line-height:1;padding:0;font-weight:700;}
.staff-btn{position:absolute;top:-6px;left:-6px;width:18px;height:18px;border-radius:50%;background:#BA7517;color:white;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.15s;border:none;line-height:1;padding:0;}
.client-btn{position:absolute;bottom:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#534AB7;color:white;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.15s;border:none;line-height:1;padding:0;}
.cell:hover .remove-btn,.assigned:hover .remove-btn,
.cell:hover .return-btn,.assigned:hover .return-btn,
.cell:hover .staff-btn,.assigned:hover .staff-btn,
.cell:hover .client-btn,.assigned:hover .client-btn{opacity:1;}
.ret-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px;background:#e0e0e0;color:#888;}
.queue-card{background:#fff;border:1px solid #D0CEC9;border-radius:8px;padding:7px 10px;position:relative;cursor:grab;width:100%;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.queue-slot{width:130px;flex-shrink:0;border-radius:7px;border:1px dashed #C8C6C2;background:#E8E6E2;min-height:76px;position:relative;transition:.15s;cursor:default;}
.queue-slot:not(.filled):hover{border-color:#185FA5;background:#EBF3FC;}
.queue-slot.filled{border:1px solid #D0CEC9;background:#FAFAF9;cursor:grab;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.queue-slot.filled:active{cursor:grabbing;}
.queue-slot.drag-over{border-color:#185FA5 !important;background:#E6F1FB !important;}
.queue-slot-num{font-size:9px;color:#A8A6A2;padding:4px 7px 0;display:block;font-weight:500;}
.queue-slot-empty{font-size:22px;color:#185FA5;text-align:center;padding:12px 4px 2px;line-height:1;}
.queue-num{font-size:9px;font-weight:600;color:#2C3E6B;background:#DDE6F5;padding:1px 5px;border-radius:3px;display:inline-block;margin-bottom:3px;}
.queue-store{font-size:11px;font-weight:600;color:#1F2D45;margin-bottom:2px;line-height:1.3;}
.queue-info{font-size:10px;color:#777;line-height:1.5;}
.queue-del{position:absolute;top:3px;right:3px;width:13px;height:13px;border-radius:50%;background:#ccc;color:#fff;font-size:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;}
.queue-del:hover{background:#E24B4A;}
.queue-card.drag-over-q{background:#E6F1FB;border-color:#185FA5;}
.round-hdr-a{font-size:9px;font-weight:600;letter-spacing:.4px;padding:3px 8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.round-hdr-a:hover{filter:brightness(.95);}
.round-hdr-a .chv{font-size:9px;transition:transform .2s;}
.round-hdr-a.open .chv{transform:rotate(180deg);}
.r2-add-btn{font-size:10px;padding:2px 8px;border-radius:6px;border:1px dashed #aaa;background:transparent;color:#888;cursor:pointer;margin:4px 8px;width:calc(100% - 16px);font-family:inherit;}
.r2-add-btn:hover{background:#f0f0f0;}
.staff-badge{font-size:12px;opacity:.85;display:block;line-height:1.6;}
.cell-divider-a{border:none;border-top:0.5px solid rgba(0,0,0,.15);margin:3px 0;}
.client-badge{font-size:12px;font-weight:500;color:#3C3489;display:block;line-height:1.6;}

.token-card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px 14px;min-width:160px;display:flex;flex-direction:column;gap:6px;}
.token-room{font-size:13px;font-weight:600;color:#2C3E6B;}
.token-controls{display:flex;align-items:center;gap:8px;}
.token-btn{width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:#f5f5f5;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1;color:#333;flex-shrink:0;}
.token-btn:hover{background:#e0e0e0;}
.token-count{font-size:20px;font-weight:700;color:#1F2D45;min-width:24px;text-align:center;}
.token-label{font-size:11px;color:#aaa;}
.token-summary-box{padding:8px 16px;border-radius:10px;text-align:center;}
.ts-lent{background:#FAEEDA;border:1px solid #BA7517;color:#633806;}
.ts-remain{background:#E1F5EE;border:1px solid #0F6E56;color:#085041;}
.ts-num{font-size:20px;font-weight:700;display:block;}
.ts-lbl{font-size:11px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:24px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal h3{font-size:16px;font-weight:600;margin-bottom:6px;}
.modal p{font-size:13px;color:#888;margin-bottom:16px;}
.modal-btns{display:flex;flex-direction:column;gap:8px;}
.ext-opt{padding:10px 16px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:14px;font-weight:500;cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;}
.ext-opt:hover{background:#e8f0fb;border-color:#185FA5;color:#0C447C;}
.ext-cancel{padding:9px;border-radius:8px;border:none;background:#f0f0f0;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px;}
.ext-cancel:hover{background:#e0e0e0;}
</style>
</head>
<body>
<div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
  <h1 style="margin:0;line-height:1;">VIP SALON STATUS</h1>
  <div class="admin-badge">✎ 管理員模式</div>
</div>
<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
  <div class="sync-bar"><div class="sync-dot" id="syncDot"></div><span id="syncStatus">連線中...</span></div>
  <button class="settings-toggle" onclick="toggleSettings()">⚙️ 自訂時段 / 包廂 / 店鋪設定</button>
</div>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-grid">
    <div class="settings-section">
      <h3>時段設定</h3><div id="slotList"></div>
      <button class="add-btn" onclick="addSlot()">＋ 新增時段</button>
    </div>
    <div class="settings-section">
      <h3>包廂名稱設定</h3><div id="roomList"></div>
      <button class="add-btn" onclick="addRoom()">＋ 新增包廂</button>
    </div>
    <div class="settings-section">
      <h3>店鋪設定</h3><div id="storeList"></div>
      <button class="add-btn" onclick="addStore()">＋ 新增店鋪</button>
    </div>
  </div>
  <button class="apply-btn" onclick="applySettings()">套用設定並重新產生表格</button>
</div>

<!-- 店鋪列表 + 候位區同一行 -->
<div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:4px;justify-content:space-between;">
  <div style="flex-shrink:0;">
    <div class="legend-label">店鋪列表（拖拉至格子進行分配）</div>
    <div class="legend" id="legend"></div>
    <p class="tip">拖拉店鋪至格子分配；✕ 移除</p>
  </div>
  <!-- 候位區 -->
  <div id="queuePanel" style="flex-shrink:0;background:#EEECEA;border-radius:10px;border:1px solid #D8D6D2;padding:8px 12px;">
    <div style="font-size:13px;font-weight:600;color:#444;margin-bottom:6px;">📋 包廂排隊區</div>
    <div id="queueList" style="display:flex;flex-direction:row;gap:6px;flex-wrap:nowrap;"></div>
  </div>
</div>
<div class="actions">
  <button class="action-btn btn-export" onclick="exportExcel()">📥 匯出報表</button>
  <div class="action-group">
    <button class="action-btn" onclick="clearAll()" style="border-radius:8px 0 0 8px;">✕ 全部清除</button>
    <label class="action-btn" style="cursor:pointer;">
      📂 上傳客人名單
      <input type="file" id="clientExcelInput" accept=".xlsx,.xls,.csv" style="display:none;" onchange="loadClientExcel(event)"/>
    </label>
    <button class="action-btn" onclick="clearClientList()" style="border-radius:0 8px 8px 0;">🗑 清除名單</button>
  </div>
  <span id="clientListStatus" style="font-size:12px;color:#888;align-self:center;"></span>
</div>

<div class="grid-wrap"><table id="grid"></table></div>

<!-- TOKEN 借用管理 -->
<div style="margin-top:32px;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
    <div>
      <div style="font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:2px;">🎫 13號備用TOKEN 借用管理</div>
      <div style="font-size:13px;color:#888;">總數量：5 顆</div>
    </div>
    <div id="tokenSummary" style="display:flex;gap:12px;"></div>
  </div>
  <div id="tokenGrid" style="display:flex;flex-wrap:wrap;gap:10px;"></div>
</div>

<!-- 候位新增 Modal -->
<div class="modal-overlay" id="queueModal">
  <div class="modal" style="width:400px;">
    <h3>新增候位</h3>
    <p style="font-size:12px;color:#aaa;margin-bottom:14px;">填寫後可拖曳至包廂格子分配</p>

    <div style="margin-bottom:10px;">
      <label style="font-size:12px;font-weight:500;color:#444;display:block;margin-bottom:4px;">店鋪</label>
      <select id="queueStoreSelect" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:#fff;">
        <option value="">-- 選擇店鋪 --</option>
      </select>
    </div>

    <div style="border-top:1px solid #eee;padding-top:10px;margin-bottom:10px;">
      <div style="font-size:11px;font-weight:600;color:#888;letter-spacing:.5px;margin-bottom:8px;">顧客資料</div>
      <div style="margin-bottom:8px;">
        <label style="font-size:12px;font-weight:500;color:#444;display:block;margin-bottom:4px;">ID <span style="font-size:11px;color:#aaa;">（輸入後自動帶出）</span></label>
        <input id="queueClientId" type="text" placeholder="輸入客人 ID" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;"/>
        <div id="queueSuggestions" style="border:1px solid #ddd;border-top:none;border-radius:0 0 8px 8px;display:none;max-height:130px;overflow-y:auto;background:#fff;position:relative;z-index:10;"></div>
      </div>
      <div style="margin-bottom:8px;">
        <label style="font-size:12px;font-weight:500;color:#444;display:block;margin-bottom:4px;">姓名</label>
        <input id="queueClientName" type="text" placeholder="客人姓名" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;"/>
      </div>
      <div style="margin-bottom:8px;">
        <label style="font-size:12px;font-weight:500;color:#444;display:block;margin-bottom:4px;">Segment</label>
        <select id="queueSegment" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:#fff;">
          <option value="">-- 請選擇 --</option>
          <option value="Prestige">Prestige</option>
          <option value="VVIC">VVIC</option>
          <option value="VIC">VIC</option>
          <option value="Aspiring Repeaters">Aspiring Repeaters</option>
          <option value="Repeaters">Repeaters</option>
          <option value="One-Timers">One-Timers</option>
          <option value="Promising One-Timers">Promising One-Timers</option>
          <option value="Sleeper">Sleeper</option>
          <option value="Prospect">Prospect</option>
          <option value="New">New</option>
        </select>
      </div>
      <div style="margin-bottom:0;">
        <label style="font-size:12px;font-weight:500;color:#444;display:block;margin-bottom:4px;">餐飲人數</label>
        <input id="queueGuests" type="number" min="0" placeholder="輸入人數" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;"/>
      </div>
    </div>

    <div style="border-top:1px solid #eee;padding-top:10px;margin-bottom:14px;">
      <div style="font-size:11px;font-weight:600;color:#888;letter-spacing:.5px;margin-bottom:8px;">服務人員</div>
      <div style="margin-bottom:8px;">
        <label style="font-size:12px;font-weight:500;color:#444;display:block;margin-bottom:4px;">CA</label>
        <input id="queueCA" type="text" placeholder="CA 姓名" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;"/>
      </div>
      <div style="margin-bottom:8px;">
        <label style="font-size:12px;font-weight:500;color:#444;display:block;margin-bottom:4px;">Expert</label>
        <input id="queueExpert" type="text" placeholder="Expert 姓名" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;"/>
      </div>
      <div>
        <label style="font-size:12px;font-weight:500;color:#444;display:block;margin-bottom:4px;">Runner</label>
        <input id="queueRunner" type="text" placeholder="Runner 姓名" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;"/>
      </div>
    </div>

    <div class="modal-btns">
      <button class="ext-opt" onclick="confirmQueueAdd()" style="text-align:center;background:#1F2D45;color:#fff;border:none;">新增候位</button>
      <button class="ext-cancel" onclick="closeQueueModal()">取消</button>
    </div>
  </div>
</div>

<!-- 合併 Modal：客人資料 + 服務人員 -->
<div class="modal-overlay" id="infoModal">
  <div class="modal" style="width:400px;">
    <h3>填寫包廂資訊</h3>
    <p id="infoModalDesc" style="font-size:13px;color:#888;margin-bottom:14px;"></p>

    <div style="border-bottom:1px solid #eee;padding-bottom:10px;margin-bottom:10px;">
      <div style="font-size:11px;font-weight:600;color:#888;letter-spacing:.5px;margin-bottom:8px;">顧客資料</div>
      <div style="margin-bottom:8px;">
        <label style="font-size:12px;font-weight:500;color:#444;display:block;margin-bottom:4px;">ID <span style="font-size:11px;color:#aaa;">（輸入後自動帶出）</span></label>
        <input id="clientIdInput" type="text" placeholder="輸入客人 ID" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;"/>
        <div id="clientSuggestions" style="border:1px solid #ddd;border-top:none;border-radius:0 0 8px 8px;display:none;max-height:140px;overflow-y:auto;background:#fff;position:relative;z-index:10;"></div>
      </div>
      <div style="margin-bottom:8px;">
        <label style="font-size:12px;font-weight:500;color:#444;display:block;margin-bottom:4px;">姓名</label>
        <input id="clientNameInput" type="text" placeholder="輸入客人姓名" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;"/>
      </div>
      <div style="margin-bottom:8px;">

window.toggleSettings=()=>{const p=document.getElementById('settingsPanel');p.classList.toggle('open');if(p.classList.contains('open'))renderPanel();};

window.addStore=()=>{STORES.push({id:'store_'+Date.now(),name:''});renderPanel();document.getElementById(`store-${STORES.length-1}`).focus();};
window.removeStore=i=>{STORES.splice(i,1);renderPanel();};
window.applySettings=()=>{
  const oldSlots=[...SLOTS],oldRooms=[...ROOMS];
  SLOTS=Array.from(document.querySelectorAll('[id^="slot-"]')).map(el=>el.value.trim()).filter(Boolean);

  // 只清除已不存在的 slot 或 room 的資料，保留有效的
  const validKeys=new Set();
  SLOTS.forEach(slot=>ROOMS.forEach(room=>validKeys.add(key(room,slot))));
  [assignments,returned,staff,clients,assignments2,staff2,clients2,returned2].forEach(obj=>{
    Object.keys(obj).forEach(k=>{if(!validKeys.has(k))delete obj[k];});

  // TOKEN：只刪除不在 ROOMS 裡的包廂 key（保留 __other__、__borrower__ 等特殊 key）
  Object.keys(tokens).forEach(room=>{
    if(room.startsWith('__'))return; // 保留特殊 key
    if(!ROOMS.includes(room)&&!room.endsWith('__borrower__'))delete tokens[room];
  });

  // 處理包廂改名：舊名稱→新名稱（依 index 對應）

function roomStatus(slot,k){
  const p=parseSlot(slot);if(!p)return'upcoming';
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const startMs=base.getTime()+(p.startH*60+p.startM)*60*1000;
  const endMs=base.getTime()+(p.endH*60+p.endM)*60*1000;
  if(now.getTime()<startMs)return'upcoming';
  const msToEnd=endMs-now.getTime();
  if(msToEnd<0)return'overtime';
  if(msToEnd<=15*60*1000)return'warn15';
  if(msToEnd<=30*60*1000)return'warn30';
  return'active';
}
function slotStatus(slot){
  const order=['overtime','warn15','warn30','active','upcoming','done'];
  const p=parseSlot(slot);
  if(!p)return'upcoming';
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const startMs=base.getTime()+(p.startH*60+p.startM)*60*1000;
  const endMs=base.getTime()+(p.endH*60+p.endM)*60*1000;
  // 還沒開始
  if(now.getTime()<startMs)return'upcoming';
  // 已結束且所有包廂歸還
  if(now.getTime()>endMs){
    const hasUnreturned=ROOMS.some(room=>{
      const k=key(room,slot);
      return (assignments[k]&&!returned[k])||(assignments2[k]&&!returned2[k]);
    });
    if(!hasUnreturned)return'done';
  }
  // 進行中：找最差狀態
  let worst='upcoming';
  ROOMS.forEach(room=>{
    const k=key(room,slot);
    if((assignments[k]&&!returned[k])||(assignments2[k]&&!returned2[k])){
      const st=roomStatus(slot,k);
      if(order.indexOf(st)<order.indexOf(worst))worst=st;
    }
  });
  return worst;
}
function parseSlot(slot){
  const parts=slot.replace(/[–—-]/,'|').split('|');
  if(parts.length<2)return null;
  const[sh,sm]=(parts[0].trim()+':00').split(':').map(Number);
  const[eh,em]=(parts[1].trim()+':00').split(':').map(Number);
  return{startH:sh,startM:sm||0,endH:eh,endM:em||0};
}
function slotTimeStatus(slot){
  const p=parseSlot(slot);if(!p)return{st:'upcoming',mins:null};
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const startMs=base.getTime()+(p.startH*60+p.startM)*60*1000;
  const endMs=base.getTime()+(p.endH*60+p.endM)*60*1000;
  if(now.getTime()<startMs)return{st:'upcoming',mins:null};
  const msToEnd=endMs-now.getTime();
  if(msToEnd<0){
    const si=SLOTS.indexOf(slot);
    const hasUnreturned=ROOMS.some(room=>{
      const k=key(room,slot);
      return assignments[k]&&!returned[k];
    });
    if(!hasUnreturned){
      if(si===SLOTS.length-1)return{st:'done',mins:null}; // 最後場次
      const nextP=parseSlot(SLOTS[si+1]);
      if(nextP){
        const nextStartMs=base.getTime()+(nextP.startH*60+nextP.startM)*60*1000;
        if(now.getTime()>=nextStartMs)return{st:'done',mins:null};
      }
    }
    return{st:'overtime',mins:Math.abs(Math.round(msToEnd/60000))};
  }
  const mins=Math.round(msToEnd/60000);
  if(mins<=15)return{st:'warn15',mins};
  if(mins<=30)return{st:'warn30',mins};
  return{st:'active',mins};
}
function slotCountdownHTML(slot){
  const{st,mins}=slotTimeStatus(slot);
  if(st==='upcoming')return`<span class="slot-countdown sc-up">待開始</span>`;
  if(st==='active')return`<span class="slot-countdown sc-active">進行中 剩 ${mins} 分</span>`;
  if(st==='warn30')return`<span class="slot-countdown sc-warn30">⚠ 剩 ${mins} 分鐘</span>`;
  if(st==='warn15')return`<span class="slot-countdown sc-warn15">⚠ 剩 ${mins} 分鐘</span>`;
  if(st==='overtime')return`<span class="slot-countdown sc-ot">🚨 已超時 ${mins} 分</span>`;
  return`<span class="slot-countdown sc-done">已結束</span>`;
}

function getFloorFromName(roomName){
  const m=roomName.match(/(\d+F|B\d+)/i);

}

const FLOOR_COLOR_MAP={
  '6F':{bg:'#534AB7',text:'#ffffff'},
  '5F':{bg:'#3B6D11',text:'#ffffff'},
  '4F':{bg:'#7C3E0E',text:'#ffffff'},

};
function getFloorColor(f){return FLOOR_COLOR_MAP[f]||{bg:'#555',text:'#ffffff'};}
const FLOOR_COLORS=FLOOR_COLOR_MAP;

function buildGrid(){
  const tbl=document.getElementById('grid');
  // 雙行表頭：樓層 + 包廂名稱
  const floorSpans={};
  ROOMS.forEach((_,i)=>{const f=getFloor(i);floorSpans[f]=(floorSpans[f]||0)+1;});
  let floorRow='<tr><th rowspan="2" style="background:#2C3E6B;color:#fff;font-size:14px;font-weight:600;text-align:center;border-right:2px solid #3d5080;vertical-align:middle;padding:10px 14px;">時段 / 包廂</th>';
  let roomRow='<tr>';
  const seenFloors=new Set();
  ROOMS.forEach((room,i)=>{
    const f=getFloor(i);
    const fc=getFloorColor(f);
    if(!seenFloors.has(f)){
      seenFloors.add(f);
      const borderL=i>0?'border-left:2px solid #3d5080;':'';
      floorRow+=`<th colspan="${floorSpans[f]}" style="background:${fc.bg};color:${fc.text};font-size:13px;font-weight:600;padding:8px 6px;text-align:center;${borderL}letter-spacing:.5px;">${f}</th>`;
    }
    const borderL=getFloor(i)!==getFloor(i-1)&&i>0?'border-left:2px solid #3d5080;':'';
    roomRow+=`<th style="background:#2C3E6B;color:#ffffff;font-size:13px;font-weight:600;padding:10px 8px;text-align:center;border-right:0.5px solid #3d5080;${borderL}">${room}</th>`;
  });
  floorRow+='</tr>';roomRow+='</tr>';

  let h=`<thead>${floorRow}${roomRow}</thead><tbody>`;
  const statusOrder={'overtime':0,'warn15':1,'warn30':2,'active':3,'upcoming':4,'done':5};
  const sortedSlots=[...SLOTS].sort((a,b)=>{
    const sa=slotStatus(a),sb=slotStatus(b);
    const oa=statusOrder[sa]??6,ob=statusOrder[sb]??6;
    if(oa!==ob)return oa-ob;
    return SLOTS.indexOf(a)-SLOTS.indexOf(b);
  });
  sortedSlots.forEach(slot=>{
    h+=`<tr><td><div class="slot-label"><span class="slot-time-txt">${slot}</span><span id="slotlbl-${encodeURIComponent(slot)}">${slotCountdownHTML(slot)}</span></div></td>`;
    ROOMS.forEach((room,i)=>{
      const borderL=getFloor(i)!==getFloor(i-1)&&i>0?'border-left:2px solid #c8cfe0;':'';
      h+=`<td style="${borderL}"><div class="cell" data-room="${encodeURIComponent(room)}" data-slot="${encodeURIComponent(slot)}"></div></td>`;
    });
    h+='</tr>';
  });
  tbl.innerHTML=h+'</tbody>';
  document.querySelectorAll('.cell').forEach(cell=>{
    cell.addEventListener('dragover',e=>{e.preventDefault();cell.classList.add('drag-over');});
    cell.addEventListener('dragleave',()=>cell.classList.remove('drag-over'));
    cell.addEventListener('dragenter',e=>e.preventDefault());
    cell.addEventListener('drop',e=>{
      e.preventDefault();cell.classList.remove('drag-over');
      const k=key(decodeURIComponent(cell.dataset.room),decodeURIComponent(cell.dataset.slot));

      // 候位卡片拖曳（優先判斷，不被 dragStore 擋住）
      const qIdx=e.dataTransfer.getData('queueIdx');
      if(qIdx!==''&&qIdx!==undefined&&qIdx!==null){
        const idx=parseInt(qIdx);
        const item=queue[idx];
        if(!item)return;
        assignments[k]=item.storeId;
        if(item.client&&Object.keys(item.client).length>0)clients[k]=item.client;
        if(item.staff&&Object.keys(item.staff).length>0)staff[k]=item.staff;
        delete returned[k];
        queue[idx]=null;
        buildQueuePanel();render();push();
        return;
      }

      // 一般店鋪或包廂格子拖曳
      if(!dragStore)return;
      if(dragFrom&&dragFrom!==k){
        if(staff[dragFrom])  {staff[k]=staff[dragFrom];  delete staff[dragFrom];}  else delete staff[k];
        if(clients[dragFrom]){clients[k]=clients[dragFrom];delete clients[dragFrom];}else delete clients[k];
        if(assignments2[dragFrom]){assignments2[k]=assignments2[dragFrom];delete assignments2[dragFrom];}else delete assignments2[k];
        if(staff2[dragFrom])  {staff2[k]=staff2[dragFrom];  delete staff2[dragFrom];}  else delete staff2[k];
        if(clients2[dragFrom]){clients2[k]=clients2[dragFrom];delete clients2[dragFrom];}else delete clients2[k];
        delete returned2[dragFrom];delete returned2[k];
        delete returned[dragFrom];
        delete returned[k];
        delete assignments[dragFrom];
      }
      assignments[k]=dragStore;dragStore=null;dragFrom=null;render();push();
    });
  });
}

window.loadClientExcel=(e)=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1});

      // 找標頭列（含 Dream ID 或 ID 的那列）
      let headerRow=-1;
      let idCol=-1,lastNameCol=-1,firstNameCol=-1,segCol=-1,caCol=-1,guestCol=-1;
      for(let r=0;r<Math.min(10,data.length);r++){
        const row=data[r]||[];
        const lower=row.map(h=>String(h||'').toLowerCase());
        if(lower.some(h=>h.includes('dream id')||h.includes('dream_id'))){
          headerRow=r;
          lower.forEach((h,i)=>{
            if(h.includes('dream id')||h.includes('dream_id'))idCol=i;
            if(h==='姓氏'||h==='last name'||h==='lastname')lastNameCol=i;
            if(h==='名字'||h==='first name'||h==='firstname')firstNameCol=i;
            if((h.includes('顧客層級')||h==='segment'||h==='seg')&&segCol===-1)segCol=i;
            if((h==='ca名字'||h==='ca name'||h==='ca')&&caCol===-1)caCol=i;
            if((h.includes('幾位友人')||h.includes('友人')||h==='guests'||h==='guest')&&guestCol===-1)guestCol=i;
          });
          break;
        }
      }
      if(headerRow===-1||idCol===-1){
        alert('找不到 Dream ID 欄位，請確認 Excel 格式');return;
      }
      clientList=data.slice(headerRow+1).map(row=>{
        const id=String(row[idCol]||'').trim();
        if(!id||id==='nan'||id==='NaN')return null;
        const lastName=lastNameCol>=0?String(row[lastNameCol]||'').trim():'';
        const firstName=firstNameCol>=0?String(row[firstNameCol]||'').trim():'';
        const name=[lastName,firstName].filter(Boolean).join(' ');
        const segment=segCol>=0?String(row[segCol]||'').trim():'';
        const ca=caCol>=0?String(row[caCol]||'').trim():'';
        const guests=guestCol>=0&&row[guestCol]!==undefined&&row[guestCol]!==''?String(row[guestCol]).trim():'';
        return{id,name,segment,ca,guests};
      }).filter(c=>c&&c.id);

      // 存進 Firebase
      set(clientListRef,clientList).then(()=>{
        const segments=[...new Set(clientList.map(c=>c.segment).filter(Boolean))].sort();
        updateSegmentDropdown(segments);
        document.getElementById('clientListStatus').textContent=`✓ 已載入 ${clientList.length} 位客人（已同步）`;
        document.getElementById('clientListStatus').style.color='#085041';
      });
    }catch(err){alert('讀取失敗，請確認檔案格式');console.error(err);}
  };
  reader.readAsArrayBuffer(file);
  e.target.value='';
};

const QUEUE_SLOTS=5;
let dragQueueIdx=null;

function buildQueuePanel(){
  while(queue.length<QUEUE_SLOTS)queue.push(null);
  if(queue.length>QUEUE_SLOTS)queue.length=QUEUE_SLOTS;
  const list=document.getElementById('queueList');
  if(!list)return;
  list.innerHTML='';

  queue.forEach((item,idx)=>{
    const slot=document.createElement('div');
    slot.className='queue-slot'+(item?' filled':'');
    slot.dataset.slotIdx=idx;

    if(item){
      const cl=item.client||{},sf=item.staff||{};
      const guestTxt=cl.guests?`（餐飲${cl.guests}人）`:'';
      slot.draggable=true;
      slot.innerHTML=`
        <span class="queue-slot-num">順位 ${idx+1}</span>
        <div class="queue-card">
          <div class="queue-num">順位 ${idx+1}</div>
          <div class="queue-store">${item.storeName||''}${guestTxt}</div>
          <div class="queue-info">
            ${cl.clientName?`Name: ${cl.clientName}<br>`:''}
            ${cl.segment?`Seg: ${cl.segment}<br>`:''}
            ${sf.ca?`🧑‍💼 ${sf.ca}<br>`:''}
            ${sf.expert?`💡 ${sf.expert}<br>`:''}
            ${sf.runner?`🏃 ${sf.runner}`:''}
          </div>
          <button class="queue-del" onclick="removeQueue(${idx})">✕</button>
        </div>`;
      slot.addEventListener('dragstart',e=>{
        dragQueueIdx=idx;
        dragStore=null;dragFrom=null;
        e.dataTransfer.setData('queueIdx',String(idx));
        e.dataTransfer.effectAllowed='move';
      });
      slot.addEventListener('dragend',()=>{dragQueueIdx=null;});
    }else{
      slot.style.cursor='pointer';
      slot.innerHTML=`<span class="queue-slot-num">順位 ${idx+1}</span><div class="queue-slot-empty">＋</div>`;
      slot.addEventListener('click',()=>openQueueAddModal(idx));
    }

    slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('drag-over');});
    slot.addEventListener('dragleave',()=>slot.classList.remove('drag-over'));
    slot.addEventListener('drop',e=>{
      e.preventDefault();slot.classList.remove('drag-over');

      // 從另一個候位格子拖來（互換）
      const fromQ=e.dataTransfer.getData('queueIdx');
      if(fromQ!==''){
        const fi=parseInt(fromQ);
        if(fi!==idx){const tmp=queue[fi];queue[fi]=queue[idx];queue[idx]=tmp;buildQueuePanel();push();}
        return;
      }

      // 從包廂格子拖來
      if(dragFrom){
        const storeId=assignments[dragFrom];
        const s=STORES.find(x=>x.id===storeId);
        if(s){
          queue[idx]={storeId,storeName:s.name,client:{...(clients[dragFrom]||{})},staff:{...(staff[dragFrom]||{})}};
          delete assignments[dragFrom];delete returned[dragFrom];delete staff[dragFrom];delete clients[dragFrom];
          dragFrom=null;dragStore=null;
          buildQueuePanel();render();push();
        }
      }
    });
    list.appendChild(slot);
  });
}

    const matches=clientList.filter(c=>c.id.toLowerCase().includes(q)||c.name.toLowerCase().includes(q)).slice(0,6);
    if(!matches.length){box.style.display='none';return;}
    box.innerHTML=matches.map(c=>`<div style="padding:7px 12px;cursor:pointer;font-size:12px;border-bottom:0.5px solid #eee;" onmousedown="selectQueueClient('${c.id.replace(/'/g,"\\'")}','${c.name.replace(/'/g,"\\'")}','${c.segment.replace(/'/g,"\\'")}','${(c.ca||'').replace(/'/g,"\\'")}','${(c.guests||'').replace(/'/g,"\\'")}')"><strong>${c.id}</strong> ${c.name} <span style="color:#534AB7;font-size:11px;">${c.segment}</span>${c.guests?`<span style="color:#888;font-size:11px;margin-left:4px;">餐飲:${c.guests}人</span>`:''}</div>`).join('');
    box.style.display='block';
  });
});
window.selectQueueClient=(id,name,segment,ca,guests)=>{
  document.getElementById('queueClientId').value=id;
  document.getElementById('queueClientName').value=name;
  document.getElementById('queueSegment').value=segment;
  if(ca)document.getElementById('queueCA').value=ca;
  if(guests)document.getElementById('queueGuests').value=guests;
  document.getElementById('queueSuggestions').style.display='none';
};

function buildAll(){buildLegend();buildGrid();render();buildQueuePanel();}

// ── TOKEN 借用管理 ──────────────────────────────
function totalLent(){
  return Object.entries(tokens).reduce((s,[k,v])=>{
    if(k==='__other_note__'||k==='__other_borrower__'||k.endsWith('__borrower__'))return s;
    return s+(typeof v==='number'?v:0);
  },0);
}
function buildTokenSection(){
  const lent=totalLent();
  document.getElementById('tokenSummary').innerHTML=`
    <div class="token-summary-box ts-lent"><span class="ts-num">${lent}</span><span class="ts-lbl">已借出</span></div>`;
  const grid=document.getElementById('tokenGrid');
  grid.innerHTML='';
  ROOMS.forEach(room=>{
    const k=safeKey(room);
    const cnt=tokens[k]||0;
    const borrower=tokens[k+'__borrower__']||'';
    const card=document.createElement('div');
    card.className='token-card';
    card.innerHTML=`
      <div class="token-room">${room}</div>
      <div class="token-controls">
        <button class="token-btn" data-room="${room}" data-delta="-1">－</button>
        <span class="token-count">${cnt}</span>
        <button class="token-btn" data-room="${room}" data-delta="1">＋</button>
      </div>
      ${cnt>0?`<input class="token-borrower-input" data-borrower-room="${room}" type="text" placeholder="借用人姓名" value="${borrower}" style="width:100%;padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit;outline:none;" onfocus="this.style.borderColor='#185FA5'" onblur="this.style.borderColor='#ddd'"/>`:''}
      <div class="token-label">${cnt>0?`已借 ${cnt} 顆${borrower?' · '+borrower:''}`:'未借用'}</div>`;
    grid.appendChild(card);
  });

  // 「其他」卡片
  const otherCnt=tokens['__other_count__']||0;
  const otherNote=tokens['__other_note__']||'';
  const otherBorrower=tokens['__other_borrower__']||'';
  const otherCard=document.createElement('div');
  otherCard.className='token-card';
  otherCard.style.minWidth='200px';
  otherCard.innerHTML=`
    <div class="token-room">其他</div>
    <input id="otherNoteInput" type="text" placeholder="說明（例：前台暫借）"
      value="${otherNote}"
      style="width:100%;padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit;margin-bottom:4px;outline:none;"
      onfocus="this.style.borderColor='#185FA5'" onblur="this.style.borderColor='#ddd'"/>
    <div class="token-controls">
      <button class="token-btn" data-room="__other__" data-delta="-1">－</button>
      <span class="token-count">${otherCnt}</span>
      <button class="token-btn" data-room="__other__" data-delta="1">＋</button>
    </div>
    ${otherCnt>0?`<input id="otherBorrowerInput" type="text" placeholder="借用人姓名" value="${otherBorrower}" style="width:100%;padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit;outline:none;" onfocus="this.style.borderColor='#185FA5'" onblur="this.style.borderColor='#ddd'"/>`:''}
    <div class="token-label">${otherCnt>0?`已借 ${otherCnt} 顆${otherBorrower?' · '+otherBorrower:''}`:'未借用'}</div>`;
  grid.appendChild(otherCard);

  // 備註欄輸入監聽
  const noteInput=document.getElementById('otherNoteInput');
  if(noteInput){
    noteInput.addEventListener('change',()=>{
      tokens['__other_note__']=noteInput.value.trim();push();
    });
  }
  const otherBorrowerInput=document.getElementById('otherBorrowerInput');
  if(otherBorrowerInput){
    otherBorrowerInput.addEventListener('change',()=>{
      tokens['__other_borrower__']=otherBorrowerInput.value.trim();push();
    });
  }
  // 借用人輸入監聽（各包廂）
  grid.querySelectorAll('.token-borrower-input').forEach(input=>{
    input.addEventListener('change',()=>{
      const room=input.dataset.borrowerRoom;
      const val=input.value.trim();
      if(val)tokens[safeKey(room)+'__borrower__']=val;
      else delete tokens[safeKey(room)+'__borrower__'];
      push();
    });
  });

  // Event delegation for +/- buttons
  grid.onclick=(e)=>{
    const btn=e.target.closest('[data-delta]');
    if(!btn)return;
    const room=btn.dataset.room;
    const delta=parseInt(btn.dataset.delta);
    adjustToken(room,delta);
  };
}
function safeKey(room){return room.replace(/[.#$/[\]\s]/g,'_');}
function adjustToken(room,delta){
  const key=room==='__other__'?'__other_count__':safeKey(room);
  const cur=tokens[key]||0;
  const lent=totalLent();
  const next=cur+delta;
  if(next<0)return;
  if(delta>0&&lent>=TOKEN_TOTAL){alert('已達借用上限（5 顆）！');return;}
  if(next===0)delete tokens[key];
  else tokens[key]=next;
  buildTokenSection();push();
}

// 每3秒更新時段倒數標籤
setInterval(()=>{updateSlotLabels();buildGrid();render();},3000);
// 初始化 TOKEN 區域
buildTokenSection();

// ── 匯出報表 ──────────────────────────────
window.exportExcel=function(){
  const today=new Date();
  const dateStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const todayData={slots:SLOTS,rooms:ROOMS,stores:STORES,assignments,staff,returned,clients,assignments2,staff2,returned2,clients2,savedAt:new Date().toISOString()};
  if(typeof XLSX==='undefined'){alert('報表套件載入中，請稍後再試');return;}
  set(ref(db,`history/${dateStr}`),todayData).then(()=>{
    get(ref(db,'history')).then(snap=>{
      const history=snap.val()||{};
      const wb=XLSX.utils.book_new();
      const dates=Object.keys(history).sort();
      const rows=[['日期','時段','包廂','輪次','店鋪','客人ID','客人姓名','Segment','餐飲人數','Expert','Runner','CA','已歸還']];
      dates.forEach(date=>{
        const d=history[date];if(!d)return;
        const slotList=d.slots||[],roomList=d.rooms||[],storeList=d.stores||[];
        const asgn=d.assignments||{},sfData=d.staff||{},retData=d.returned||{};
        const asgn2=d.assignments2||{},sfData2=d.staff2||{},retData2=d.returned2||{};
        let dateShown=false;
        slotList.forEach(slot=>{
          let slotShown=false;
          roomList.forEach(room=>{
            const k=`${room}||${slot}`;
            const sid=asgn[k];
            const sid2=asgn2[k];
            if(!sid&&!sid2)return;
            // 第一輪
            if(sid){
              const s=storeList.find(x=>x.id===sid);
              const sfInfo=sfData[k]||{};
              const clInfo=(d.clients||{})[k]||{};
              const retVal=retData[k]?'✓':'';
              rows.push([dateShown?'':date,slotShown?'':slot,room,'第一輪',s?s.name:'',clInfo.clientId||'',clInfo.clientName||'',clInfo.segment||'',clInfo.guests||'',sfInfo.expert||'',sfInfo.runner||'',sfInfo.ca||'',retVal]);
              dateShown=true;slotShown=true;
            }
            // 第二輪
            if(sid2){
              const s2=storeList.find(x=>x.id===sid2);
              const sfInfo2=sfData2[k]||{};
              const clInfo2=(d.clients2||{})[k]||{};
              const retVal2=retData2[k]?'✓':'';
              rows.push([dateShown?'':date,slotShown&&sid?'':slot,room,'第二輪',s2?s2.name:'',clInfo2.clientId||'',clInfo2.clientName||'',clInfo2.segment||'',clInfo2.guests||'',sfInfo2.expert||'',sfInfo2.runner||'',sfInfo2.ca||'',retVal2]);
              dateShown=true;slotShown=true;
            }
          });
        });
        if(dateShown)rows.push([]);
      });
      if(rows.length<=1){alert('尚無資料可匯出');return;}
      const ws=XLSX.utils.aoa_to_sheet(rows);
      ws['!cols']=[{wch:12},{wch:18},{wch:10},{wch:8},{wch:10},{wch:12},{wch:12},{wch:10},{wch:12},{wch:12},{wch:12},{wch:8}];
      ws['!freeze']={xSplit:0,ySplit:1};
      XLSX.utils.book_append_sheet(wb,ws,'VIP Salon 全期紀錄');
      XLSX.writeFile(wb,'VIP_Salon_全期報表.xlsx');
    });
  }).catch(err=>{alert('儲存失敗，請確認網路連線');console.error(err);});
};
</script>
